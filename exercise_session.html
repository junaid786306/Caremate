<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Workout Session - Caremate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00193c",
                        "secondary": "#4f55ae",
                        "background": "#faf9fe",
                        "on-surface": "#1a1b1f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem"
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
    .timer-ring {
        transition: stroke-dashoffset 0.35s;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
    }
</style>
</head>
<body class="bg-background text-on-surface font-manrope antialiased min-h-screen flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-primary">close</span>
        </button>
        <h1 class="font-bold text-xl tracking-tight text-primary text-center flex-1">Morning Mobility</h1>
        <div class="w-10"></div>
    </header>

    <main class="flex-1 flex flex-col p-6 max-w-2xl mx-auto w-full">
        <!-- Video Player -->
        <div class="relative w-full aspect-video bg-slate-900 rounded-[32px] overflow-hidden shadow-2xl mb-8 group">
            <img class="w-full h-full object-cover opacity-60" src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?q=80&w=2070&auto=format&fit=crop">
            <div class="absolute inset-0 flex items-center justify-center">
                <button id="video-play-btn" class="w-20 h-20 bg-white/20 backdrop-blur-xl rounded-full flex items-center justify-center border border-white/30 text-white hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                </button>
            </div>
            <!-- Progress Bar -->
            <div class="absolute bottom-0 left-0 w-full h-1.5 bg-white/20">
                <div id="video-progress" class="h-full bg-primary w-1/3 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Exercise Details -->
        <div class="flex-1 flex flex-col items-center justify-center text-center space-y-8">
            <div>
                <h2 class="text-3xl font-extrabold text-primary mb-2">Gentle Stretching</h2>
                <p class="text-slate-500 font-medium italic">Focus on your breathing and move slowly.</p>
            </div>

            <!-- Circular Timer -->
            <div class="relative w-48 h-48 flex items-center justify-center">
                <svg class="w-full h-full">
                    <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96" />
                    <circle id="timer-progress" class="text-primary timer-ring" stroke-width="8" stroke-dasharray="502.65" stroke-dashoffset="125" stroke-linecap="round" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96" />
                </svg>
                <div class="absolute flex flex-col items-center">
                    <span id="timer-text" class="text-4xl font-black text-primary">05:42</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">remaining</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col w-full gap-4 pt-4">
                <button id="start-btn" onclick="startSession()" class="w-full h-16 bg-primary text-white rounded-[24px] font-bold text-lg shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined">play_circle</span>
                    <span>Start Exercise</span>
                </button>
                <div class="flex gap-4">
                    <button class="flex-1 h-14 bg-white border border-slate-200 rounded-[24px] font-bold text-slate-600 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">bookmark</span>
                        <span>Save</span>
                    </button>
                    <a href="activity_comments.html" class="flex-1 h-14 bg-white border border-slate-200 rounded-[24px] font-bold text-slate-600 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">chat_bubble</span>
                        <span>Comment</span>
                    </a>
                </div>
                <button id="end-btn" onclick="history.back()" class="w-full h-14 bg-slate-50 text-slate-400 rounded-[24px] font-bold text-sm active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-lg">stop_circle</span>
                    <span>End Session</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        let isStarted = false;
        function startSession() {
            const startBtn = document.getElementById('start-btn');
            const endBtn = document.getElementById('end-btn');
            
            if (!isStarted) {
                isStarted = true;
                startBtn.innerHTML = '<span class="material-symbols-outlined">pause_circle</span><span>Pause Session</span>';
                startBtn.classList.remove('bg-primary');
                startBtn.classList.add('bg-slate-800');
                endBtn.classList.remove('text-slate-400', 'bg-slate-100');
                endBtn.classList.add('text-error', 'bg-error-container/30', 'border', 'border-error/10');
            } else {
                isStarted = false;
                startBtn.innerHTML = '<span class="material-symbols-outlined">play_circle</span><span>Resume Session</span>';
                startBtn.classList.add('bg-primary');
                startBtn.classList.remove('bg-slate-800');
            }
        }
    </script>
</body></html>
