<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Reset Password - Caremate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "surface": "#faf9fe", "primary": "#00193c", "surface-container": "#eeedf2", "surface-container-low": "#f4f3f8", "primary-fixed": "#d7e2ff", "secondary": "#4f55ae", "on-primary": "#ffffff", "outline-variant": "#c4c6d1", "on-surface-variant": "#43474f", "primary-container": "#002d62", "on-background": "#1a1b1f"
            },
            "borderRadius": { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
            "spacing": { "stack-sm": "12px", "margin-page": "24px", "stack-md": "24px", "touch-target-min": "60px", "stack-lg": "40px" },
            "fontFamily": { "label-caps": ["Manrope"], "headline-md": ["Manrope"], "body-lg": ["Manrope"], "display": ["Manrope"], "body-md": ["Manrope"] },
            "fontSize": {
              "label-caps": ["14px", {"lineHeight": "20px", "letterSpacing": "1px", "fontWeight": "700"}],
              "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
              "body-lg": ["20px", {"lineHeight": "30px", "fontWeight": "500"}],
              "display": ["34px", {"lineHeight": "42px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
              "body-md": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          }
        }
      }
</script>
<style>
  body { background-color:#faf9fe; background-image:radial-gradient(at 0% 0%, rgba(215,226,255,.3) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(154,160,255,.1) 0px, transparent 50%); min-height:100vh; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .glass-panel { background:rgba(255,255,255,.7); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.5); }
  input::placeholder { color:#92969a; opacity:.7; }
</style>
</head>
<body class="font-body-md text-on-background flex flex-col items-center p-margin-page">
<main class="w-full max-w-md mx-auto flex flex-col gap-stack-lg pt-12 pb-24">
<header class="flex flex-col items-center text-center gap-stack-sm mb-4">
<div class="w-20 h-20 rounded-xl bg-primary-container flex items-center justify-center shadow-lg shadow-primary/10 mb-4">
<span class="material-symbols-outlined text-primary-fixed text-4xl">lock_reset</span>
</div>
<h1 class="font-display text-display text-primary">Caremate</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-4">Reset your password</p>
</header>
<section class="glass-panel p-8 rounded-xl shadow-[0_8px_32px_rgba(0,25,60,0.06)] flex flex-col gap-stack-md">
<a href="login.html" class="w-fit flex items-center gap-2 text-secondary font-bold text-sm hover:underline">
<span class="material-symbols-outlined text-lg">arrow_back</span>
Back to login
</a>
<form class="flex flex-col gap-8" onsubmit="document.getElementById('reset-message').classList.remove('hidden'); return false;">
<div class="flex flex-col gap-4">
<h2 class="font-headline-md text-headline-md text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-secondary">mail</span>
Forgot Password
</h2>
<p class="text-sm leading-6 text-on-surface-variant">Enter your email address and we will send you a secure reset link.</p>
<div class="flex flex-col gap-stack-sm">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Email Address</label>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="e.g. name@email.com" type="email" required>
</div>
</div>
</div>
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-DEFAULT shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3 mt-2">
Send Reset Link
<span class="material-symbols-outlined">send</span>
</button>
<p id="reset-message" class="hidden rounded-2xl bg-primary-fixed/60 px-4 py-3 text-center text-sm font-bold text-primary">Reset link sent. Check your email.</p>
</form>
<div class="mt-4 flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-[11px] font-bold text-on-surface-variant/70">
<a href="#" class="hover:text-primary transition-colors">Terms</a>
<a href="settings_privacy_policy.html" class="hover:text-primary transition-colors">Privacy Policy</a>
<a href="settings_help.html" class="hover:text-primary transition-colors">Help</a>
<a href="settings_contact.html" class="hover:text-primary transition-colors">Contact</a>
</div>
</section>
</main>
</body></html>
