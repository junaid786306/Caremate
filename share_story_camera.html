    <!-- Drawing & Recording JS -->
    <script>
        // DOM Elements
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const captureBtnInner = document.getElementById('capture-btn-inner');
        const progressCircle = document.getElementById('progress-circle');
        const cameraVideo = document.getElementById('camera-video');
        const uploadedVideo = document.getElementById('uploaded-video');
        const cameraImage = document.getElementById('camera-image');
        const cameraStatus = document.getElementById('camera-status');
        const cameraStatusText = document.getElementById('camera-status-text');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const publishBtn = document.getElementById('publish-btn');
        const headerSpacer = document.getElementById('header-spacer');
        const brushPalette = document.getElementById('brush-palette');
        const toolDraw = document.getElementById('tool-draw');
        const textContainer = document.getElementById('text-container');
        const videoOverlay = document.getElementById('video-overlay');
        const videoTimer = document.getElementById('video-timer');
        const focusRing = document.getElementById('focus-ring');
        const captureLabel = document.getElementById('capture-label');

        // State
        let isDrawing = false;
        let drawModeActive = false;
        let currentColor = '#ef4444';
        let isEraser = false;
        let brushSize = 9;
        let lastX = 0;
        let lastY = 0;

        let recordTimer = null;
        let recordDuration = 0;
        const MAX_RECORD_TIME = 30000; // 30 seconds
        let isRecording = false;
        let recordingTriggered = false;
        let cameraStream = null;
        let currentFacingMode = 'environment';
        let liveCameraReady = false;
        let cameraPermissionTimer = null;
        let currentUploadUrl = null;

        async function getCameraStream(facingMode) {
            try {
                return await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: facingMode } },
                    audio: false
                });
            } catch (exactError) {
                return navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: facingMode } },
                    audio: false
                });
            }
        }

        function updateCameraButtonLabel() {
            const label = currentFacingMode === 'environment' ? 'Back camera active' : 'Front camera active';
            switchCameraBtn.setAttribute('aria-label', label);
            switchCameraBtn.title = label;
        }

        async function startLiveCamera(facingMode = currentFacingMode) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showCameraFallback('Camera is not supported in this browser. Upload a photo instead.');
                return false;
            }

            stopLiveCamera();
            clearTimeout(cameraPermissionTimer);
            cameraStatusText.textContent = 'Starting camera...';
            cameraStatus.classList.remove('hidden');
            cameraVideo.classList.remove('hidden');
            uploadedVideo.classList.add('hidden');
            uploadedVideo.pause();
            cameraImage.classList.add('hidden');
            cameraPermissionTimer = setTimeout(() => {
                if (!liveCameraReady) {
                    cameraStatusText.textContent = 'Allow camera permission to use live camera.';
                    cameraStatus.classList.remove('hidden');
                }
            }, 1500);

            try {
                const stream = await getCameraStream(facingMode);
                clearTimeout(cameraPermissionTimer);
                cameraStream = stream;
                cameraVideo.srcObject = stream;
                await cameraVideo.play();
                currentFacingMode = facingMode;
                liveCameraReady = true;
                updateCameraButtonLabel();
                cameraStatus.classList.add('hidden');
                cameraVideo.classList.remove('hidden');
                uploadedVideo.classList.add('hidden');
                uploadedVideo.pause();
                cameraImage.classList.add('hidden');
                focusRing.style.opacity = '1';
                return true;
            } catch (error) {
                clearTimeout(cameraPermissionTimer);
                liveCameraReady = false;
                showCameraFallback('Allow camera permission to use live camera, or upload a photo.');
                return false;
            }
        }

        function stopLiveCamera() {
            if (!cameraStream) return;
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
        }

        function showCameraFallback(message) {
            cameraStatusText.textContent = message;
            cameraStatus.classList.remove('hidden');
            cameraVideo.classList.add('hidden');
            uploadedVideo.classList.add('hidden');
            cameraImage.classList.remove('hidden');
        }

        function showLivePreview() {
            if (!liveCameraReady) return;
            cameraImage.classList.add('hidden');
            uploadedVideo.classList.add('hidden');
            uploadedVideo.pause();
            cameraVideo.classList.remove('hidden');
            publishBtn.classList.add('hidden');
            headerSpacer.classList.remove('hidden');
        }

        function revokeCurrentUploadUrl() {
            if (!currentUploadUrl) return;
            URL.revokeObjectURL(currentUploadUrl);
            currentUploadUrl = null;
        }

        function showUploadedImage(url) {
            stopLiveCamera();
            revokeCurrentUploadUrl();
            currentUploadUrl = url;
            uploadedVideo.pause();
            uploadedVideo.removeAttribute('src');
            uploadedVideo.load();
            cameraImage.src = url;
            cameraVideo.classList.add('hidden');
            uploadedVideo.classList.add('hidden');
            cameraImage.classList.remove('hidden');
            cameraStatus.classList.add('hidden');
            onCaptureComplete();
            showToast('Photo ready to share.');
        }

        function showUploadedVideo(url) {
            stopLiveCamera();
            revokeCurrentUploadUrl();
            currentUploadUrl = url;
            uploadedVideo.src = url;
            uploadedVideo.currentTime = 0;
            uploadedVideo.muted = true;
            uploadedVideo.controls = true;
            cameraVideo.classList.add('hidden');
            cameraImage.classList.add('hidden');
            uploadedVideo.classList.remove('hidden');
            cameraStatus.classList.add('hidden');
            uploadedVideo.play().catch(() => {});
            onCaptureComplete();
            showToast('Video ready to share.');
        }

        async function switchCamera() {
            const previousFacingMode = currentFacingMode;
            const nextFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            cameraStatusText.textContent = nextFacingMode === 'environment' ? 'Switching to back camera...' : 'Switching to front camera...';
            cameraStatus.classList.remove('hidden');
            const switched = await startLiveCamera(nextFacingMode);
            if (!switched) {
                await startLiveCamera(previousFacingMode);
                showToast('This camera is not available on this device.');
            }
        }

        updateCameraButtonLabel();

        // Resize Canvas
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('load', () => startLiveCamera());
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('beforeunload', stopLiveCamera);

        // Drawing Event Listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            startDrawing({ clientX: touch.clientX, clientY: touch.clientY });
            e.preventDefault();
        });
        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            draw({ clientX: touch.clientX, clientY: touch.clientY });
            e.preventDefault();
        });
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            if (!drawModeActive) return;
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        }

        function draw(e) {
            if (!isDrawing || !drawModeActive) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
            }
            
            ctx.lineWidth = brushSize;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();

            lastX = x;
            lastY = y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function toggleDrawMode() {
            drawModeActive = !drawModeActive;
            if (drawModeActive) {
                canvas.className = "absolute inset-0 z-20 pointer-events-auto cursor-crosshair";
                toolDraw.classList.add('btn-active');
                brushPalette.classList.remove('translate-x-10', 'opacity-0', 'pointer-events-none');
                brushPalette.classList.add('translate-x-0', 'opacity-100', 'pointer-events-auto');
                focusRing.style.opacity = '0';
            } else {
                canvas.className = "absolute inset-0 z-20 pointer-events-none";
                toolDraw.classList.remove('btn-active');
                brushPalette.classList.add('translate-x-10', 'opacity-0', 'pointer-events-none');
                brushPalette.classList.remove('translate-x-0', 'opacity-100', 'pointer-events-auto');
                closeBrushPanels();
                focusRing.style.opacity = '1';
            }
        }

        function closeBrushPanels() {
            brushPalette.querySelectorAll('.brush-flyout').forEach(panel => panel.classList.add('hidden'));
        }

        function toggleBrushPanel(panelId) {
            const panel = document.getElementById(panelId);
            if (!panel) return;
            const shouldOpen = panel.classList.contains('hidden');
            closeBrushPanels();
            if (shouldOpen) panel.classList.remove('hidden');
        }

        function selectEraser(btn) {
            isEraser = true;
            brushPalette.querySelectorAll('.color-swatch').forEach(b => {
                b.classList.remove('ring-2', 'ring-red-500', 'ring-blue-500', 'ring-emerald-500', 'ring-yellow-500', 'ring-slate-400', 'ring-primary', 'is-selected');
            });
            btn.classList.add('ring-2', 'ring-primary');
        }

        function selectColor(btn, color) {
            isEraser = false;
            currentColor = color;
            const customColorInput = document.getElementById('custom-color-input');
            if (customColorInput) customColorInput.value = color;
            brushPalette.querySelectorAll('.color-swatch').forEach(b => {
                b.classList.remove('ring-2', 'ring-red-500', 'ring-blue-500', 'ring-emerald-500', 'ring-yellow-500', 'ring-slate-400', 'ring-primary', 'is-selected');
            });
            btn.classList.add('is-selected');
        }

        function openCustomColorPicker() {
            const customColorInput = document.getElementById('custom-color-input');
            if (customColorInput) customColorInput.click();
        }

        function selectCustomColor(color) {
            const customColorBtn = document.getElementById('custom-color-btn');
            if (!customColorBtn) return;
            customColorBtn.style.background = color;
            customColorBtn.style.color = getReadableTextColor(color);
            selectColor(customColorBtn, color);
        }

        function getReadableTextColor(hex) {
            const cleanHex = hex.replace('#', '');
            const red = parseInt(cleanHex.slice(0, 2), 16);
            const green = parseInt(cleanHex.slice(2, 4), 16);
            const blue = parseInt(cleanHex.slice(4, 6), 16);
            const brightness = (red * 299 + green * 587 + blue * 114) / 1000;
            return brightness > 150 ? '#001b3f' : '#ffffff';
        }

        function setBrushPreset(btn, size) {
            brushSize = size;
            const brushInput = document.getElementById('brush-size');
            if (brushInput) brushInput.value = size;
            brushPalette.querySelectorAll('.brush-preset').forEach(b => b.classList.remove('ring-2', 'ring-primary'));
            btn.classList.add('ring-2', 'ring-primary');
            closeBrushPanels();
        }

        function setupDraggableBrushPalette() {
            const handle = document.getElementById('brush-drag-handle');
            if (!handle) return;
            let dragging = false;
            let offsetX = 0;
            let offsetY = 0;
            const movePalette = (clientX, clientY) => {
                const parent = document.getElementById('preview-container').getBoundingClientRect();
                const rect = brushPalette.getBoundingClientRect();
                const left = Math.max(12, Math.min(clientX - parent.left - offsetX, parent.width - rect.width - 12));
                const top = Math.max(92, Math.min(clientY - parent.top - offsetY, parent.height - rect.height - 92));
                brushPalette.style.left = left + 'px';
                brushPalette.style.top = top + 'px';
                brushPalette.style.transform = 'none';
            };
            handle.addEventListener('pointerdown', (event) => {
                dragging = true;
                handle.setPointerCapture(event.pointerId);
                const rect = brushPalette.getBoundingClientRect();
                offsetX = event.clientX - rect.left;
                offsetY = event.clientY - rect.top;
            });
            handle.addEventListener('pointermove', (event) => {
                if (!dragging) return;
                movePalette(event.clientX, event.clientY);
            });
            handle.addEventListener('pointerup', () => { dragging = false; });
            handle.addEventListener('pointercancel', () => { dragging = false; });
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            textContainer.innerHTML = '';
            showToast('Canvas reset successfully!');
        }

        // Draggable Editable Text Sticker
        const textToolbar = document.getElementById('text-toolbar');
        let activeSticker = null;
        let textHasBackground = true;
        let textFontIndex = 0;
        let activeTextColor = '#ffffff';
        let activeTextBackground = '#001b3f';
        const fonts = ['font-manrope', 'font-serif', 'font-mono', 'italic'];
        const fontLabels = ['Classic', 'Serif', 'Mono', 'Italic'];

        textToolbar.addEventListener('pointerdown', (event) => {
            event.preventDefault();
        });

        function showTextToolbar(sticker) {
            activeSticker = sticker;
            textToolbar.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            textToolbar.classList.add('translate-y-0');
        }
        
        function hideTextToolbar() {
            textToolbar.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            textToolbar.classList.remove('translate-y-0');
            setTimeout(() => { if(!document.activeElement.isContentEditable) activeSticker = null; }, 100);
        }

        function applyTextStickerStyle(sticker = activeSticker) {
            if (!sticker) return;
            sticker.classList.remove(...fonts);
            sticker.classList.add(fonts[textFontIndex]);
            sticker.style.color = activeTextColor;
            sticker.style.backgroundColor = textHasBackground ? activeTextBackground : 'transparent';
            sticker.style.borderColor = textHasBackground ? 'rgba(255, 255, 255, 0.22)' : 'rgba(255, 255, 255, 0)';
            sticker.style.textShadow = textHasBackground ? 'none' : '0 2px 10px rgba(0, 0, 0, 0.65)';
            sticker.style.boxShadow = textHasBackground ? '0 16px 32px rgba(0, 0, 0, 0.26)' : 'none';
        }

        function cycleTextFont() {
            if (!activeSticker) return;
            textFontIndex = (textFontIndex + 1) % fonts.length;
            document.getElementById('font-toggle-btn').innerText = fontLabels[textFontIndex];
            applyTextStickerStyle();
        }

        function openTextColorPicker() {
            const input = document.getElementById('text-color-input');
            if (input) input.click();
        }

        function openTextBgColorPicker() {
            const input = document.getElementById('text-bg-input');
            if (input) input.click();
        }

        function setTextColor(color) {
            if (!activeSticker) return;
            activeTextColor = color;
            const btn = document.getElementById('text-color-btn');
            if (btn) {
                btn.style.backgroundColor = color;
                btn.style.color = getReadableTextColor(color);
            }
            applyTextStickerStyle();
        }

        function setTextBackgroundColor(color) {
            if (!activeSticker) return;
            activeTextBackground = color;
            textHasBackground = true;
            const btn = document.getElementById('text-bg-btn');
            const modeBtn = document.getElementById('text-bg-mode-btn');
            if (btn) {
                btn.style.backgroundColor = color;
                btn.style.color = getReadableTextColor(color);
            }
            if (modeBtn) modeBtn.classList.add('btn-active');
            applyTextStickerStyle();
        }

        function toggleTextBackground() {
            if (!activeSticker) return;
            textHasBackground = !textHasBackground;
            const modeBtn = document.getElementById('text-bg-mode-btn');
            if (modeBtn) modeBtn.classList.toggle('btn-active', textHasBackground);
            applyTextStickerStyle();
        }

        function cycleTextBackground() {
            toggleTextBackground();
        }

        function cycleTextColor() {
            openTextColorPicker();
        }

        function addTextSticker() {
            // Disable draw mode to prevent overlaps
            if (drawModeActive) toggleDrawMode();

            const sticker = document.createElement('div');
            sticker.className = `absolute z-30 ${fonts[textFontIndex]} font-extrabold text-sm px-4 py-2.5 rounded-2xl border select-text cursor-move min-w-[140px] text-center pointer-events-auto select-none outline-none focus:ring-2 focus:ring-secondary/50 transition-all`;
            sticker.contentEditable = "true";
            sticker.innerText = "Double tap to edit";
            sticker.style.top = '40%';
            sticker.style.left = '25%';
            applyTextStickerStyle(sticker);

            // Simple Drag Mechanics
            let isDraggingSticker = false;
            let offsetOffsetX = 0;
            let offsetOffsetY = 0;

            sticker.addEventListener('mousedown', (e) => {
                if (document.activeElement === sticker) return; // Don't drag while editing text
                isDraggingSticker = true;
                const rect = sticker.getBoundingClientRect();
                offsetOffsetX = e.clientX - rect.left;
                offsetOffsetY = e.clientY - rect.top;
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDraggingSticker) return;
                const parentRect = textContainer.getBoundingClientRect();
                let x = e.clientX - parentRect.left - offsetOffsetX;
                let y = e.clientY - parentRect.top - offsetOffsetY;
                
                // Bounds checking
                x = Math.max(10, Math.min(x, parentRect.width - sticker.offsetWidth - 10));
                y = Math.max(10, Math.min(y, parentRect.height - sticker.offsetHeight - 10));

                sticker.style.left = x + 'px';
                sticker.style.top = y + 'px';
            });

            document.addEventListener('mouseup', () => {
                isDraggingSticker = false;
            });

            // Touch events
            sticker.addEventListener('touchstart', (e) => {
                if (document.activeElement === sticker) return;
                isDraggingSticker = true;
                const touch = e.touches[0];
                const rect = sticker.getBoundingClientRect();
                offsetOffsetX = touch.clientX - rect.left;
                offsetOffsetY = touch.clientY - rect.top;
            });

            document.addEventListener('touchmove', (e) => {
                if (!isDraggingSticker) return;
                const touch = e.touches[0];
                const parentRect = textContainer.getBoundingClientRect();
                let x = touch.clientX - parentRect.left - offsetOffsetX;
                let y = touch.clientY - parentRect.top - offsetOffsetY;

                x = Math.max(10, Math.min(x, parentRect.width - sticker.offsetWidth - 10));
                y = Math.max(10, Math.min(y, parentRect.height - sticker.offsetHeight - 10));

                sticker.style.left = x + 'px';
                sticker.style.top = y + 'px';
                e.preventDefault();
            });

            document.addEventListener('touchend', () => {
                isDraggingSticker = false;
            });

            // Focus interactions
            sticker.addEventListener('focus', () => {
                if (sticker.innerText === "Double tap to edit") {
                    sticker.innerText = "";
                }
                showTextToolbar(sticker);
            });

            sticker.addEventListener('blur', () => {
                if (sticker.innerText.trim() === "") {
                    sticker.innerText = "Double tap to edit";
                }
                hideTextToolbar();
            });

            textContainer.appendChild(sticker);
            sticker.focus();
        }

        setupDraggableBrushPalette();

        // Tap/Long Press Capturing Logic
        let pressTimer = null;
        
        function handlePressStart(e) {
            e.preventDefault();
            recordingTriggered = false;
            pressTimer = setTimeout(() => {
                startVideoRecording();
            }, 300); // Wait 300ms to distinguish long press from single tap
        }

        function handlePressEnd(e) {
            e.preventDefault();
            clearTimeout(pressTimer);
            if (isRecording) {
                stopVideoRecording();
            } else {
                takePhoto();
            }
        }

        // Bind Capture Button
        captureBtn.addEventListener('mousedown', handlePressStart);
        captureBtn.addEventListener('mouseup', handlePressEnd);
        captureBtn.addEventListener('touchstart', handlePressStart);
        captureBtn.addEventListener('touchend', handlePressEnd);

        // Photo capture
        function takePhoto() {
            captureBtnInner.classList.add('scale-75');
            setTimeout(() => captureBtnInner.classList.remove('scale-75'), 150);

            if (liveCameraReady && cameraVideo.videoWidth && cameraVideo.videoHeight) {
                const photoCanvas = document.createElement('canvas');
                photoCanvas.width = cameraVideo.videoWidth;
                photoCanvas.height = cameraVideo.videoHeight;
                const photoCtx = photoCanvas.getContext('2d');
                photoCtx.drawImage(cameraVideo, 0, 0, photoCanvas.width, photoCanvas.height);
                cameraImage.src = photoCanvas.toDataURL('image/jpeg', 0.92);
                cameraVideo.classList.add('hidden');
                cameraImage.classList.remove('hidden');
            }
            
            showToast('Photo captured successfully! 📸');
            onCaptureComplete();
        }

        // 30s Video recording
        function startVideoRecording() {
            isRecording = true;
            recordingTriggered = true;
            recordDuration = 0;
            focusRing.style.opacity = '0';
            videoOverlay.classList.remove('opacity-0');
            videoOverlay.classList.add('opacity-100');
            captureBtnInner.classList.add('bg-red-500', 'rounded-lg', 'scale-75');
            captureBtnInner.classList.remove('bg-white');
            captureLabel.innerText = "Recording... Release to Stop";

            const interval = 100; // ms
            recordTimer = setInterval(() => {
                recordDuration += interval;
                
                // Update SVG progress ring
                const pct = (recordDuration / MAX_RECORD_TIME) * 100;
                const strokeDashoffset = 264 - (264 * pct) / 100;
                progressCircle.style.strokeDashoffset = strokeDashoffset;

                // Update REC Timer
                videoTimer.innerText = (recordDuration / 1000).toFixed(1) + 's';

                if (recordDuration >= MAX_RECORD_TIME) {
                    stopVideoRecording();
                }
            }, interval);
        }

        function stopVideoRecording() {
            if (!isRecording) return;
            clearInterval(recordTimer);
            isRecording = false;
            
            focusRing.style.opacity = '1';
            videoOverlay.classList.add('opacity-0');
            videoOverlay.classList.remove('opacity-100');
            captureBtnInner.classList.remove('bg-red-500', 'rounded-lg', 'scale-75');
            captureBtnInner.classList.add('bg-white');
            progressCircle.style.strokeDashoffset = 264;
            captureLabel.innerText = "Hold for Video / Tap Photo";

            showToast(`Video recorded successfully! 🎥 (${(recordDuration/1000).toFixed(1)}s)`);
            
            // Switch image to simulated playing state
            const previewTarget = liveCameraReady && !cameraVideo.classList.contains('hidden') ? cameraVideo : cameraImage;
            previewTarget.classList.add('scale-105', 'brightness-110');
            setTimeout(() => previewTarget.classList.remove('scale-105', 'brightness-110'), 600);

            onCaptureComplete();
        }

        // Transition interface to edit / ready-to-share state
        function onCaptureComplete() {
            publishBtn.classList.remove('hidden');
            headerSpacer.classList.add('hidden');
        }

        function publishStory() {
            showToast('Uploading Story... 🚀');
            setTimeout(() => {
                showToast('Story Shared Successfully! ✨');
                setTimeout(() => {
                    history.back();
                }, 1000);
            }, 1500);
        }

        // Helper Toast function
        function showToast(msg) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');
            text.innerText = msg;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
                toast.classList.remove('opacity-100');
            }, 2500);
        }

        // --- Media Upload & Trimmer Logic ---
        const trimmerModal = document.getElementById('video-trimmer-modal');
        let pendingVideoUploadUrl = null;

        function handleMediaUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.type.startsWith('video/')) {
                const uploadUrl = URL.createObjectURL(file);
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = function() {
                    if (video.duration > 30) {
                        pendingVideoUploadUrl = uploadUrl;
                        openTrimmer();
                    } else {
                        showUploadedVideo(uploadUrl);
                    }
                }
                video.onerror = function() {
                    URL.revokeObjectURL(uploadUrl);
                    showToast('Could not open this video.');
                };
                video.src = uploadUrl;
            } else if (file.type.startsWith('image/')) {
                const url = URL.createObjectURL(file);
                showUploadedImage(url);
            }
        }

        function openTrimmer() {
            trimmerModal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeTrimmer(clearPending = true) {
            trimmerModal.classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('media-upload').value = '';
            if (clearPending && pendingVideoUploadUrl) {
                URL.revokeObjectURL(pendingVideoUploadUrl);
                pendingVideoUploadUrl = null;
            }
        }

        function confirmTrim() {
            closeTrimmer(false);
            if (pendingVideoUploadUrl) {
                showUploadedVideo(pendingVideoUploadUrl);
                pendingVideoUploadUrl = null;
            }
        }

        function processUpload(file) {
            const uploadUrl = URL.createObjectURL(file);
            if (file.type.startsWith('video/')) {
                showUploadedVideo(uploadUrl);
            } else {
                showUploadedImage(uploadUrl);
            }
        }
    </script>
</body>
</html>
