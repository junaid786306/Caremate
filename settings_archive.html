<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Archive - Caremate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#00193c", "secondary": "#4f55ae" }, fontFamily: { "manrope": ["Manrope", "sans-serif"] } } }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { color: #00193c; border-bottom: 2px solid #00193c; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-manrope antialiased min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-primary">arrow_back</span>
        </button>
        <h1 class="font-bold text-xl text-primary text-center flex-1">Archive</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-2xl mx-auto pt-2 pb-[120px]">
        <div class="text-center mb-4 px-4">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Only you can see your archived content</p>
        </div>

        <!-- Scrollable Tabs -->
        <div class="w-full overflow-x-auto hide-scrollbar border-b border-slate-200 mb-4 bg-white sticky top-[72px] z-40 shadow-sm">
            <div class="flex px-2 min-w-max">
                <button onclick="switchTab('stories')" id="tab-stories" class="tab-btn tab-active px-5 py-4 font-bold text-sm transition-colors text-slate-400 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">history_toggle_off</span> Stories
                </button>
                <button onclick="switchTab('videos')" id="tab-videos" class="tab-btn px-5 py-4 font-bold text-sm transition-colors text-slate-400 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">movie</span> Videos
                </button>
                <button onclick="switchTab('images')" id="tab-images" class="tab-btn px-5 py-4 font-bold text-sm transition-colors text-slate-400 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">image</span> Images
                </button>
                <button onclick="switchTab('blogs')" id="tab-blogs" class="tab-btn px-5 py-4 font-bold text-sm transition-colors text-slate-400 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">article</span> Blogs
                </button>
            </div>
        </div>

        <!-- Content Containers -->
        <div id="content-stories" class="tab-content grid grid-cols-3 gap-1 px-1">
            <div class="aspect-[9/16] bg-slate-200 relative overflow-hidden cursor-pointer" onclick="window.location.href='story_highlight_viewer.html?owner=me'">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=300&h=533&fit=crop" class="w-full h-full object-cover">
                <div class="absolute bottom-2 left-2 text-white text-xs font-bold bg-black/40 px-2 py-0.5 rounded-full">1y ago</div>
            </div>
            <div class="aspect-[9/16] bg-slate-200 relative overflow-hidden cursor-pointer" onclick="window.location.href='story_highlight_viewer.html?owner=me'">
                <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=300&h=533&fit=crop" class="w-full h-full object-cover">
                <div class="absolute bottom-2 left-2 text-white text-xs font-bold bg-black/40 px-2 py-0.5 rounded-full">1y ago</div>
            </div>
        </div>

        <div id="content-videos" class="tab-content hidden grid grid-cols-3 gap-1 px-1">
            <div class="aspect-square bg-slate-200 relative overflow-hidden cursor-pointer" onclick="window.location.href='reels.html'">
                <img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=300&fit=crop" class="w-full h-full object-cover">
                <div class="absolute top-2 right-2"><span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">play_circle</span></div>
            </div>
        </div>

        <div id="content-images" class="tab-content hidden grid grid-cols-3 gap-1 px-1">
            <div class="aspect-square bg-slate-200 relative overflow-hidden cursor-pointer" onclick="window.location.href='single_post_view.html'">
                <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=300&h=300&fit=crop" class="w-full h-full object-cover">
            </div>
            <div class="aspect-square bg-slate-200 relative overflow-hidden cursor-pointer" onclick="window.location.href='single_post_view.html'">
                <img src="https://images.unsplash.com/photo-1518611012118-29a83679f223?w=300&h=300&fit=crop" class="w-full h-full object-cover">
            </div>
        </div>

        <div id="content-blogs" class="tab-content hidden space-y-4 px-4">
            <div class="bg-white rounded-[24px] p-5 border border-slate-100 shadow-sm flex items-center justify-between" onclick="window.location.href='blog_post_detail.html'">
                <div>
                    <h3 class="font-bold text-primary text-sm mb-1">Healthy Breakfast Ideas for Seniors</h3>
                    <p class="text-xs text-slate-400 font-medium">Archived on Oct 12, 2026</p>
                </div>
                <span class="material-symbols-outlined text-slate-300">chevron_right</span>
            </div>
        </div>
    </main>

    <script>
        function switchTab(tabId) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
            });
            document.getElementById('tab-' + tabId).classList.add('tab-active');

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById('content-' + tabId).classList.remove('hidden');
        }
    </script>
</body>
</html>
