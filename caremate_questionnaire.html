<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Questionnaire - Caremate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #faf9fe; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-[#1a1b1f] min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px] sticky top-0 z-50">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-[#00193c]">arrow_back</span>
        </button>
        <div class="flex gap-1.5 items-center">
            <div class="w-2 h-2 rounded-full bg-[#00193c]"></div>
            <div class="w-2 h-2 rounded-full bg-[#d7e2ff]"></div>
            <div class="w-2 h-2 rounded-full bg-[#d7e2ff]"></div>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-md mx-auto p-6 flex flex-col gap-8 pb-32">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-[#00193c] tracking-tight mb-2">Let's get to know you</h1>
            <p class="text-slate-500">This helps Caremate Assistant personalize your experience.</p>
        </div>

        <form class="flex flex-col gap-6" onsubmit="window.location.href='caremate_payment.html'; return false;">
            <!-- Age & Language -->
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-[14px] font-bold tracking-wide uppercase text-slate-500 ml-1">Age</label>
                    <input type="number" class="w-full h-[60px] px-6 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#4f55ae] outline-none transition-all shadow-sm" placeholder="e.g. 70" required>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[14px] font-bold tracking-wide uppercase text-slate-500 ml-1">Language</label>
                    <select class="w-full h-[60px] px-6 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#4f55ae] outline-none transition-all shadow-sm appearance-none">
                        <option>English</option>
                        <option>Spanish</option>
                        <option>Hindi</option>
                        <option>Mandarin</option>
                    </select>
                </div>
            </div>

            <!-- Sleep Cycle -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-bold tracking-wide uppercase text-slate-500 ml-1">Usual Sleep Cycle</label>
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">bedtime</span>
                        <input type="time" class="w-full h-[60px] pl-12 pr-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#4f55ae] outline-none transition-all shadow-sm text-slate-600">
                        <span class="absolute right-4 -top-6 text-[10px] text-slate-400 font-bold uppercase tracking-wider">Bedtime</span>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">wb_sunny</span>
                        <input type="time" class="w-full h-[60px] pl-12 pr-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#4f55ae] outline-none transition-all shadow-sm text-slate-600">
                        <span class="absolute right-4 -top-6 text-[10px] text-slate-400 font-bold uppercase tracking-wider">Wake up</span>
                    </div>
                </div>
            </div>

            <!-- Doctor Information -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-bold tracking-wide uppercase text-slate-500 ml-1">Primary Doctor</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">stethoscope</span>
                    <input type="text" class="w-full h-[60px] pl-12 pr-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#4f55ae] outline-none transition-all shadow-sm" placeholder="Dr. Name (Optional)">
                </div>
            </div>

            <!-- Medical History (Voice to text) -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-bold tracking-wide uppercase text-slate-500 ml-1">Medical History & Allergies</label>
                <div class="relative">
                    <textarea class="w-full h-[120px] p-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#4f55ae] outline-none transition-all shadow-sm resize-none" placeholder="E.g., Allergic to penicillin, type 2 diabetes..."></textarea>
                    <button type="button" class="absolute bottom-4 right-4 w-10 h-10 bg-[#e0e0ff] text-[#02026b] rounded-full flex items-center justify-center shadow-sm active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">mic</span>
                    </button>
                </div>
                <p class="text-[11px] text-slate-400 ml-1 flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">info</span> You can tap the microphone to speak.
                </p>
            </div>

            <!-- Continue Button -->
            <div class="fixed bottom-0 left-0 w-full p-6 bg-white border-t border-slate-100 pb-10 z-50">
                <button type="submit" class="w-full max-w-md mx-auto h-[60px] bg-[#00193c] text-white font-bold text-lg rounded-full shadow-lg shadow-[#00193c]/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                    Continue
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>
        </form>
    </main>
</body>
</html>
