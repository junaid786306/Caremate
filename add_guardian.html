<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Add Guardian - Caremate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00193c",
                        "secondary": "#4f55ae",
                        "on-surface-variant": "#43474f",
                        "outline-variant": "#c4c6d1",
                        "primary-container": "#002d62",
                        "primary-fixed": "#d7e2ff",
                        "surface-variant": "#e3e2e7",
                        "background": "#faf9fe",
                        "on-surface": "#1a1b1f",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f8faff] text-on-surface font-manrope antialiased min-h-screen pb-[120px]">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-primary">arrow_back</span>
        </button>
        <h1 class="font-bold text-xl text-primary">Add Guardian</h1>
        <div class="w-10"></div> <!-- Spacer -->
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">
        <!-- Introduction & Dynamic Profile -->
        <div class="flex items-center justify-between">
            <div class="space-y-2">
                <h2 class="text-2xl font-extrabold tracking-tight">New Guardian</h2>
                <p class="text-slate-500 font-medium text-sm">Add a trusted person to your safety network.</p>
            </div>
            <!-- Profile Image with Camera Icon -->
            <div class="relative group shrink-0" onclick="triggerImageUpload()" style="cursor: pointer;">
                <div id="profile-circle" class="w-20 h-20 rounded-full border-2 border-dashed border-primary/40 bg-primary/5 flex flex-col items-center justify-center shadow-inner transition-all group-active:scale-95">
                    <img id="dynamic-profile-img" src="" alt="Profile" class="w-full h-full object-cover rounded-full hidden">
                    <div id="camera-placeholder" class="flex flex-col items-center justify-center gap-1">
                        <span class="material-symbols-outlined text-primary text-[32px] drop-shadow-sm" style="font-variation-settings: 'FILL' 0;">add_a_photo</span>
                        <span class="text-[9px] font-bold text-primary/60 uppercase tracking-wider">Add Photo</span>
                    </div>
                </div>
                <!-- Hover overlay when photo is set -->
                <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                    <span class="material-symbols-outlined text-white text-[20px]">edit</span>
                </div>
            </div>
        </div>

        <input type="file" id="hidden-file-input" class="hidden" accept="image/*">

        <!-- Form -->
        <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='emergency_sos.html';">
            <!-- Guardian Name -->
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Guardian Name</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
                    <input type="text" id="guardian-name" required placeholder="e.g., Sarah Johnson" class="w-full h-14 pl-12 pr-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold">
                </div>
            </div>

            <!-- Phone Number -->
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Phone Number</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">call</span>
                    <input type="tel" required placeholder="+1 (555) 000-0000" class="w-full h-14 pl-12 pr-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold">
                </div>
            </div>

            <!-- Email Address -->
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Email Address</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
                    <input type="email" required placeholder="guardian@example.com" class="w-full h-14 pl-12 pr-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold">
                </div>
            </div>

            <!-- Relationship -->
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Relationship</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">family_restroom</span>
                    <select id="guardian-relationship" class="w-full h-14 pl-12 pr-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold appearance-none">
                        <option value="">Select Relationship</option>
                        <option value="Daughter">Daughter</option>
                        <option value="Son">Son</option>
                        <option value="Spouse">Spouse</option>
                        <option value="Sibling">Sibling</option>
                        <option value="Friend">Friend</option>
                        <option value="Other">Other</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                </div>
            </div>

            <!-- Action Button -->
            <div class="pt-4">
                <button type="submit" class="w-full h-16 bg-primary text-white rounded-[24px] font-bold text-lg shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Save Guardian</span>
                </button>
            </div>
        </form>
    </main>

    <!-- BottomNavBar spacer -->
    <div class="h-24"></div>

    <script>
        const nameInput = document.getElementById('guardian-name');
        const relSelect = document.getElementById('guardian-relationship');
        const profileImg = document.getElementById('dynamic-profile-img');

        const maleKeywords = ['son', 'uncle', 'brother', 'father', 'dad', 'men', 'man', 'male', 'nephew', 'grandfather', 'grandpa'];
        const femaleKeywords = ['daughter', 'aunt', 'sister', 'mother', 'mom', 'women', 'woman', 'female', 'niece', 'grandmother', 'grandma'];

        const maleAvatarUrl = 'https://i.pravatar.cc/150?img=11'; // Example male avatar
        const femaleAvatarUrl = 'https://i.pravatar.cc/150?img=5'; // Example female avatar

        let customImageUploaded = false;

        function updateProfileImage() {
            if (customImageUploaded) return; // Don't override if user uploaded a custom image

            const nameVal = nameInput.value.toLowerCase();
            const relVal = relSelect.value.toLowerCase();
            const combinedText = `${nameVal} ${relVal}`;

            let isMale = maleKeywords.some(kw => combinedText.includes(kw));
            let isFemale = femaleKeywords.some(kw => combinedText.includes(kw));

            // Default to neutral based on first letter of name if no match
            let defaultChar = nameVal.charAt(0).toUpperCase() || 'G';
            let neutralAvatar = `https://ui-avatars.com/api/?name=${defaultChar}&background=00193c&color=fff`;

            if (isFemale && !isMale) {
                profileImg.src = femaleAvatarUrl;
            } else if (isMale && !isFemale) {
                profileImg.src = maleAvatarUrl;
            } else {
                profileImg.src = neutralAvatar;
            }
        }

        nameInput.addEventListener('input', updateProfileImage);
        relSelect.addEventListener('change', updateProfileImage);

        // Real-time Image Upload functionality
        const fileInput = document.getElementById('hidden-file-input');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const profileCircle = document.getElementById('profile-circle');

        function triggerImageUpload() {
            fileInput.click();
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileImg.src = e.target.result;
                    profileImg.classList.remove('hidden');
                    cameraPlaceholder.classList.add('hidden');
                    profileCircle.classList.remove('border-dashed', 'border-primary/40', 'bg-primary/5');
                    profileCircle.classList.add('border-white', 'overflow-hidden');
                    customImageUploaded = true;
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
