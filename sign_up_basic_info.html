<!DOCTYPE html><html class="h-full" lang="en"><head>

        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

          font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background h-full flex flex-col font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<header class="flex items-center justify-between px-margin-page py-gutter pt-8">
<a href="javascript:history.back()" class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</a>
<div class="flex gap-2">
<div class="w-12 h-2 rounded-full bg-primary"></div>
<div class="w-12 h-2 rounded-full bg-surface-variant"></div>
<div class="w-12 h-2 rounded-full bg-surface-variant"></div>
</div>
<div class="w-[48px]"></div>
</header>
<main class="flex-1 px-margin-page flex flex-col pt-stack-md pb-stack-lg max-w-md mx-auto w-full">
<div class="mb-stack-lg">
<h1 class="font-display text-display text-on-surface mb-stack-sm">Let's get started</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please provide your basic details to create your secure profile.</p>
</div>
<form class="flex-1 flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface uppercase tracking-wider pl-1" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline/60 shadow-sm" id="fullName" name="fullName" placeholder="e.g. Jane Doe" type="text">
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface uppercase tracking-wider pl-1" for="age">Age</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">calendar_today</span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline/60 shadow-sm" id="age" inputmode="numeric" name="age" placeholder="Years" type="number">
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface uppercase tracking-wider pl-1" for="mobile">Mobile Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">call</span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline/60 shadow-sm" id="mobile" name="mobile" placeholder="(555) 000-0000" type="tel">
</div>
<p class="text-sm text-on-surface-variant/70 pl-1 mt-1">We'll use this to verify your account.</p>
</div>
<div class="mt-auto pt-stack-lg">
<button class="w-full h-touch-target-min rounded-lg bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline-md text-headline-md shadow-[0_8px_30px_rgba(0,45,98,0.2)] hover:shadow-[0_12px_40px_rgba(0,45,98,0.3)] transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center justify-center gap-2" type="submit">
                    Continue
                    <span class="material-symbols-outlined fill-icon">arrow_forward</span>
</button>
</div>
</form>
</main>
</body></html>
