<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Change Password - Guardian</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#001b3f", secondary: "#4f55ae" }, fontFamily: { manrope: ["Manrope","sans-serif"] } } } }
    </script>
</head>
<body class="bg-[#f8faff] text-primary font-manrope antialiased min-h-screen">
    <header class="sticky top-0 z-50 bg-white px-6 py-4 border-b border-slate-100 shadow-sm flex items-center justify-between relative">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 z-10">
            <span class="material-symbols-outlined text-primary text-[28px]">arrow_back</span>
        </button>
        <h1 class="font-extrabold text-xl tracking-tight text-slate-800 absolute left-1/2 -translate-x-1/2">Change Password</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">
        <!-- Icon -->
        <div class="flex justify-center pt-4">
            <div class="w-20 h-20 bg-primary rounded-[28px] flex items-center justify-center shadow-xl shadow-primary/20">
                <span class="material-symbols-outlined text-white text-4xl">lock_reset</span>
            </div>
        </div>
        <div class="text-center space-y-1">
            <h2 class="text-xl font-extrabold">Secure Your Account</h2>
            <p class="text-sm text-slate-400 font-medium">Use a strong password with at least 8 characters</p>
        </div>

        <!-- Form -->
        <div class="space-y-4">
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-1">Current Password</label>
                <div class="relative">
                    <input id="cur-pw" type="password" placeholder="Enter current password" class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 font-medium text-sm focus:ring-2 focus:ring-primary focus:outline-none pr-12">
                    <button type="button" onclick="togglePw('cur-pw')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-1">New Password</label>
                <div class="relative">
                    <input id="new-pw" type="password" placeholder="Enter new password" class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 font-medium text-sm focus:ring-2 focus:ring-primary focus:outline-none pr-12" oninput="checkStrength(this.value)">
                    <button type="button" onclick="togglePw('new-pw')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
                <!-- Strength meter -->
                <div class="flex gap-1.5 px-1">
                    <div id="s1" class="h-1.5 flex-1 rounded-full bg-slate-200 transition-all"></div>
                    <div id="s2" class="h-1.5 flex-1 rounded-full bg-slate-200 transition-all"></div>
                    <div id="s3" class="h-1.5 flex-1 rounded-full bg-slate-200 transition-all"></div>
                    <div id="s4" class="h-1.5 flex-1 rounded-full bg-slate-200 transition-all"></div>
                </div>
                <p id="strength-label" class="text-[10px] font-bold text-slate-400 px-1">Password strength</p>
            </div>
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-1">Confirm New Password</label>
                <div class="relative">
                    <input id="conf-pw" type="password" placeholder="Confirm new password" class="w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 font-medium text-sm focus:ring-2 focus:ring-primary focus:outline-none pr-12">
                    <button type="button" onclick="togglePw('conf-pw')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
        </div>

        <button onclick="savePassword()" class="w-full py-5 bg-primary text-white font-extrabold rounded-[24px] shadow-xl shadow-primary/20 active:scale-95 transition-all">
            Update Password
        </button>
    </main>

    <script>
        function togglePw(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }
        function checkStrength(val) {
            const bars = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
            bars.forEach(b => b.style.backgroundColor = '#e2e8f0');
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            for (let i = 0; i < score; i++) bars[i].style.backgroundColor = colors[score - 1];
            document.getElementById('strength-label').textContent = score > 0 ? labels[score - 1] : 'Password strength';
            document.getElementById('strength-label').style.color = score > 0 ? colors[score - 1] : '#94a3b8';
        }
        function savePassword() {
            const n = document.getElementById('new-pw').value;
            const c = document.getElementById('conf-pw').value;
            if (!n || !c) return alert('Please fill all fields.');
            if (n !== c) return alert('Passwords do not match.');
            alert('Password updated successfully!');
            history.back();
        }
    </script>
</body>
</html>
