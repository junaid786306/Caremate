<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#dad9df",
                    "on-background": "#1a1b1f",
                    "surface": "#faf9fe",
                    "on-tertiary-fixed-variant": "#43474b",
                    "primary": "#00193c",
                    "tertiary-fixed": "#dfe3e7",
                    "surface-tint": "#3e5e95",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed": "#001b3f",
                    "inverse-surface": "#2f3034",
                    "secondary-fixed": "#e0e0ff",
                    "primary-fixed-dim": "#abc7ff",
                    "tertiary-fixed-dim": "#c3c7cb",
                    "on-secondary-fixed": "#02026b",
                    "surface-variant": "#e3e2e7",
                    "on-primary-fixed-variant": "#24467c",
                    "error": "#ba1a1a",
                    "surface-container": "#eeedf2",
                    "inverse-primary": "#abc7ff",
                    "inverse-on-surface": "#f1f0f5",
                    "on-surface": "#1a1b1f",
                    "on-tertiary-container": "#92969a",
                    "tertiary": "#151a1d",
                    "on-secondary-fixed-variant": "#373c95",
                    "on-tertiary-fixed": "#171c1f",
                    "on-surface-variant": "#43474f",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "background": "#faf9fe",
                    "on-primary-container": "#7796d1",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f4f3f8",
                    "primary-fixed": "#d7e2ff",
                    "surface-container-high": "#e8e7ed",
                    "secondary-container": "#9aa0ff",
                    "error-container": "#ffdad6",
                    "secondary": "#4f55ae",
                    "secondary-fixed-dim": "#bfc2ff",
                    "on-secondary-container": "#2d328b",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "outline": "#747781",
                    "tertiary-container": "#2a2f32",
                    "surface-container-highest": "#e3e2e7",
                    "surface-bright": "#faf9fe",
                    "primary-container": "#002d62",
                    "outline-variant": "#c4c6d1"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "stack-sm": "12px",
                    "margin-page": "24px",
                    "gutter": "16px",
                    "stack-md": "24px",
                    "touch-target-min": "60px",
                    "stack-lg": "40px"
            },
            "fontFamily": {
                    "label-caps": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "display": ["Manrope"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "label-caps": ["14px", {"lineHeight": "20px", "letterSpacing": "1px", "fontWeight": "700"}],
                    "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.3px", "fontWeight": "700"}],
                    "body-lg": ["20px", {"lineHeight": "30px", "fontWeight": "500"}],
                    "display": ["34px", {"lineHeight": "42px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                    "body-md": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #faf9fe;
            background-image: radial-gradient(at 0% 0%, rgba(215, 226, 255, 0.3) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(154, 160, 255, 0.1) 0px, transparent 50%);
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        input::placeholder {
            color: #92969a;
            opacity: 0.7;
        }
    </style>
</head>
<body class="font-body-md text-on-background flex flex-col items-center p-margin-page">
<!-- Auth Layout Container -->
<main class="w-full max-w-md mx-auto flex flex-col gap-stack-lg pt-12 pb-24">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-stack-sm mb-4">
<div class="w-20 h-20 rounded-xl bg-primary-container flex items-center justify-center shadow-lg shadow-primary/10 mb-4">
<span class="material-symbols-outlined text-primary-fixed text-4xl" data-icon="health_and_safety">health_and_safety</span>
</div>
<h1 class="font-display text-display text-primary">Caremate</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-4">Create your safety network</p>
</header>
<!-- Form Section -->
<section class="glass-panel p-8 rounded-xl shadow-[0_8px_32px_rgba(0,25,60,0.06)] flex flex-col gap-stack-md">
<!-- Login/Signup Tabs -->
<nav class="flex p-1 bg-surface-container rounded-full mb-6">
<a href="guardian_login.html" class="flex-1 py-3 px-6 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors">LOGIN</a>
<button class="flex-1 py-3 px-6 rounded-full bg-white shadow-sm font-label-caps text-label-caps text-primary active:scale-95 transition-all">SIGN UP</button>
</nav>
<form class="flex flex-col gap-8" onsubmit="window.location.href='home_dashboard.html'; return false;">
<!-- Senior Information Section -->
<div class="flex flex-col gap-4">
<h2 class="font-headline-md text-headline-md text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="person">person</span>
                        Senior Information
                    </h2>
<div class="flex flex-col gap-stack-sm">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Full Name</label>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="e.g. Jane Doe" type="text">
</div>

<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Email</label>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="senior@email.com" type="email">
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Phone Number</label>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="(555) 000-0000" type="tel">
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">OTP Code</label>
<button type="button" class="text-secondary font-bold text-sm hover:underline">Get OTP</button>
</div>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none tracking-[0.5em] font-bold text-center" placeholder="••••" type="text" maxlength="4">
</div>
</div>
</div>
<!-- Guardian Information Section -->
<div class="flex flex-col gap-4">
<h2 class="font-headline-md text-headline-md text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="shield_with_heart">shield_with_heart</span>
                        Guardian Information
                    </h2>
<div class="flex flex-col gap-stack-sm">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Guardian Name</label>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="e.g. John Smith" type="text">
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Relationship</label>
<select class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none appearance-none">
<option disabled="" selected="" value="">Select relationship</option>
<option>Child</option>
<option>Spouse</option>
<option>Professional Caregiver</option>
<option>Grandchild</option>
<option>Other</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Guardian Email</label>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="guardian@email.com" type="email">
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Guardian Phone</label>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="(555) 000-0000" type="tel">
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Guardian OTP Code</label>
<button type="button" class="text-secondary font-bold text-sm hover:underline">Get OTP</button>
</div>
<input class="w-full h-touch-target-min px-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none tracking-[0.5em] font-bold text-center" placeholder="••••" type="text" maxlength="4">
</div>
</div>
</div>
<!-- Create Account Action -->
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-DEFAULT shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3 mt-4">
                    Create Account
                    <span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</button>
</form>
<!-- T&C Link -->
<p class="text-center text-[12px] text-on-surface-variant mt-4 font-label-caps">
                By signing up, you agree to our <a class="text-secondary underline" href="#">Terms of Service</a>
</p>
</section>
</main>
</body></html>
