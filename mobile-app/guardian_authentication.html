<body class="bg-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-margin-page py-stack-lg">
<!-- Ambient Background Depth -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed opacity-30 blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed opacity-30 blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-[440px] relative z-10 flex flex-col gap-stack-lg">
<!-- Header / Brand -->
<header class="flex flex-col items-center text-center gap-stack-sm mb-stack-sm">
<div class="w-[72px] h-[72px] bg-primary rounded-[24px] flex items-center justify-center shadow-[0_12px_30px_rgba(0,25,60,0.15)] mb-unit">
<span class="material-symbols-outlined icon-fill text-[36px] text-on-primary">shield_person</span>
</div>
<h1 class="font-display text-display text-primary">Guardian</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Senior Health &amp; Safety System</p>
</header>
<!-- Segmented Control (iOS Style Toggle) -->
<div class="bg-surface-container-high rounded-full p-[4px] flex w-full relative">
<a href="guardian_login.html" class="flex-1 py-3 text-center font-label-caps text-label-caps text-on-surface-variant transition-all hover:text-on-surface">
                Login
            </a>
<a href="senior_citizen_signup.html" class="flex-1 py-3 text-center font-label-caps text-label-caps bg-surface-container-lowest text-on-surface rounded-full shadow-sm transition-all">
                Sign Up
            </a>
</div>
<!-- Form Canvas -->
<div class="bg-surface-container-lowest rounded-[32px] p-stack-md shadow-[0_20px_60px_rgba(0,45,98,0.05)] border border-outline-variant/30 flex flex-col gap-stack-md">
<div class="flex flex-col gap-stack-sm">
<!-- Full Name Input -->
<div class="flex flex-col gap-[8px]">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-unit" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-gutter top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="h-touch-target-min w-full bg-surface text-on-surface border border-outline-variant rounded-DEFAULT pl-[48px] pr-gutter font-body-lg text-body-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/60" id="fullName" placeholder="e.g. Jane Doe" type="text">
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-[8px]">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-unit" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-gutter top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="h-touch-target-min w-full bg-surface text-on-surface border border-outline-variant rounded-DEFAULT pl-[48px] pr-gutter font-body-lg text-body-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/60" id="email" placeholder="name@example.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-[8px]">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-unit" for="password">Create Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-gutter top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="h-touch-target-min w-full bg-surface text-on-surface border border-outline-variant rounded-DEFAULT pl-[48px] pr-[48px] font-body-lg text-body-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/60" id="password" placeholder="Min. 8 characters" type="password">
<button class="absolute right-gutter top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<p class="font-body-md text-[14px] text-on-surface-variant ml-unit mt-1">Must contain a number and special character.</p>
</div>
</div>
<!-- Primary Action -->
<a href="guardian_home_dashboard.html" class="h-touch-target-min w-full bg-primary text-on-primary rounded-DEFAULT font-headline-md text-headline-md shadow-[0_8px_24px_rgba(0,25,60,0.25)] flex items-center justify-center gap-unit transition-all active:scale-[0.98] mt-unit hover:bg-primary/90">
                Create Account
                <span class="material-symbols-outlined">arrow_forward</span>
</a>
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-unit">
                By signing up, you agree to our <a class="text-primary font-bold underline decoration-primary/30 underline-offset-4" href="#">Terms</a> and <a class="text-primary font-bold underline decoration-primary/30 underline-offset-4" href="#">Privacy Policy</a>.
            </p>
</div>
