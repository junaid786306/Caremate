<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Edit Guardian Details</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001b3f",
                        "secondary": "#4f55ae",
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f8faff] text-primary font-manrope antialiased min-h-screen pb-[120px]">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl px-6 py-4 flex justify-between items-center border-b border-slate-100 h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 transition-colors text-primary">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="font-bold text-lg">Guardian Details</h1>
        <button id="header-save" onclick="saveGuardian()" class="text-secondary font-bold text-sm">Save</button>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">
        <!-- Profile Picture -->
        <div class="flex flex-col items-center">
            <div class="relative group">
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg">
                    <img src="eleanor_fitzgerald_profile_1777714253211.png" alt="Profile" class="w-full h-full object-cover">
                </div>
            </div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-4">Eleanor Fitzgerald</p>
        </div>

        <!-- Guardian count warning banner (shown when only 1 premium guardian) -->
        <div id="single-guardian-banner" class="hidden bg-amber-50 border border-amber-200 rounded-2xl p-4 flex flex-col gap-3">
            <div class="flex items-start gap-3">
                <span class="material-symbols-outlined text-amber-500 flex-shrink-0 mt-0.5" style="font-variation-settings: 'FILL' 1;">warning</span>
                <div>
                    <p class="text-sm font-bold text-amber-700">Cannot Remove Last Guardian</p>
                    <p class="text-xs text-amber-600 mt-1">Please add another guardian before removing Eleanor Fitzgerald.</p>
                </div>
            </div>
            <button onclick="window.location.href='add_guardian.html'" class="w-full bg-amber-100 hover:bg-amber-200 text-amber-800 rounded-xl py-3 font-bold text-sm flex items-center justify-center gap-2 transition-colors border border-amber-300 shadow-sm mt-1">
                <span class="material-symbols-outlined text-[18px]">person_add</span> Add New Guardian
            </button>
        </div>

        <!-- Form -->
        <div class="space-y-6">
            <!-- Full Name (readonly) -->
            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">Full Name</label>
                <div class="relative">
                    <input type="text" value="Eleanor Fitzgerald" readonly class="w-full bg-slate-100 border-none rounded-2xl h-14 px-5 font-bold text-slate-400 cursor-not-allowed outline-none">
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300 text-sm">lock</span>
                </div>
            </div>

            <!-- Relationship (readonly) -->
            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">Relationship</label>
                <div class="relative">
                    <input type="text" value="Primary Caregiver" readonly class="w-full bg-slate-100 border-none rounded-2xl h-14 px-5 font-bold text-slate-400 cursor-not-allowed outline-none">
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300 text-sm">lock</span>
                </div>
            </div>

            <!-- Phone Number (editable) -->
            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">Phone Number</label>
                <div class="relative">
                    <input type="tel" id="guardian-phone" value="+1 (555) 012-3456" class="w-full bg-white border-slate-100 rounded-2xl h-14 px-5 font-bold text-slate-700 focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none">
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300">call</span>
                </div>
            </div>

            <!-- Email Address (editable) -->
            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">Email Address</label>
                <div class="relative">
                    <input type="email" id="guardian-email" value="eleanor.f@stitch.health" class="w-full bg-white border-slate-100 rounded-2xl h-14 px-5 font-bold text-slate-700 focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none">
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300">mail</span>
                </div>
            </div>

            <!-- Address -->
            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">Address</label>
                <textarea id="guardian-address" class="w-full bg-white border-slate-100 rounded-2xl p-5 font-bold text-slate-700 focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none" rows="3">123 Sunset Boulevard, Apt 4B
Los Angeles, CA 90028</textarea>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="pt-4 space-y-3">
            <button onclick="saveGuardian()" class="w-full bg-secondary text-white rounded-2xl h-14 font-bold shadow-lg shadow-secondary/20 hover:scale-[1.02] active:scale-95 transition-all">Update Information</button>
            <button id="remove-btn" class="w-full bg-white text-red-500 border border-red-50 rounded-2xl h-14 font-bold hover:bg-red-50 transition-colors">Remove as Guardian</button>
        </div>
    </main>

    <!-- Navigation Background Blur -->
    <div class="fixed bottom-0 left-0 w-full h-8 bg-gradient-to-t from-[#f8faff] to-transparent pointer-events-none"></div>

    <!-- Toast -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-[#001b3f] text-white px-6 py-3 rounded-full text-sm font-bold shadow-xl z-[100] opacity-0 pointer-events-none transition-all duration-300">Saved!</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Check if this is the only premium guardian
        const guardiansCount = parseInt(localStorage.getItem('guardiansCount') || '1');
        if (guardiansCount <= 1) {
            document.getElementById('single-guardian-banner').classList.remove('hidden');
            document.getElementById('remove-btn').style.display = 'none';
        }
    });

    function saveGuardian() {
        const phone = document.getElementById('guardian-phone').value.trim();
        const email = document.getElementById('guardian-email').value.trim();
        const address = document.getElementById('guardian-address').value.trim();
        localStorage.setItem('guardian_phone', phone);
        localStorage.setItem('guardian_email', email);
        localStorage.setItem('guardian_address', address);
        showToast('Saved!');
        setTimeout(() => history.back(), 1200);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2200);
    }
</script>
</body>
</html>
