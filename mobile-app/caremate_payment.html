<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Plans - Caremate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #faf9fe; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-[#1a1b1f] min-h-screen flex flex-col pb-[100px]">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px] sticky top-0 z-50">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-[#00193c]">arrow_back</span>
        </button>
        <div class="flex gap-1.5 items-center">
            <div class="w-2 h-2 rounded-full bg-[#00193c]"></div>
            <div class="w-2 h-2 rounded-full bg-[#00193c]"></div>
            <div class="w-2 h-2 rounded-full bg-[#d7e2ff]"></div>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-md mx-auto p-6 flex flex-col gap-6 pt-8">
        <div class="text-center">
            <span class="inline-block px-4 py-1.5 bg-[#e0e0ff] text-[#02026b] font-bold text-[10px] rounded-full uppercase tracking-widest mb-4">Premium Care</span>
            <h1 class="text-3xl font-extrabold text-[#00193c] tracking-tight mb-2">Choose your plan</h1>
            <p class="text-slate-500">Unlock Caremate Assistant, Scam Protection, and Advanced Health Tracking.</p>
        </div>

        <div class="flex flex-col gap-4 mt-4">
            <!-- Plan 1 -->
            <label class="cursor-pointer">
                <input type="radio" name="plan" class="peer sr-only" value="299">
                <div class="w-full bg-white border-2 border-slate-200 rounded-3xl p-6 peer-checked:border-[#4f55ae] peer-checked:bg-[#f8f9ff] transition-all shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-lg text-[#00193c]">Basic Care</h3>
                            <p class="text-xs text-slate-500 mt-1">Essential tools for independent living.</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-extrabold text-[#4f55ae]">₹299</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase block">/month</span>
                        </div>
                    </div>
                    <ul class="space-y-2 text-sm text-slate-600">
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Daily Health Streaks</li>
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Medicine Reminders</li>
                    </ul>
                </div>
            </label>

            <!-- Plan 2 -->
            <label class="cursor-pointer relative">
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#00193c] text-white text-[10px] font-bold uppercase tracking-widest px-4 py-1 rounded-full z-10 shadow-md">Most Popular</div>
                <input type="radio" name="plan" class="peer sr-only" value="599" checked>
                <div class="w-full bg-white border-2 border-[#4f55ae] bg-[#f8f9ff] rounded-3xl p-6 transition-all shadow-md">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-lg text-[#00193c]">Standard Care</h3>
                            <p class="text-xs text-slate-500 mt-1">Advanced AI & Guardian alerts.</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-extrabold text-[#4f55ae]">₹599</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase block">/month</span>
                        </div>
                    </div>
                    <ul class="space-y-2 text-sm text-slate-600">
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Everything in Basic</li>
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Caremate Assistant</li>
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Guardian SOS & Alerts</li>
                    </ul>
                </div>
            </label>

            <!-- Plan 3 -->
            <label class="cursor-pointer">
                <input type="radio" name="plan" class="peer sr-only" value="999">
                <div class="w-full bg-white border-2 border-slate-200 rounded-3xl p-6 peer-checked:border-[#4f55ae] peer-checked:bg-[#f8f9ff] transition-all shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-lg text-[#00193c]">Premium Care</h3>
                            <p class="text-xs text-slate-500 mt-1">Full suite with scam protection.</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-extrabold text-[#4f55ae]">₹999</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase block">/month</span>
                        </div>
                    </div>
                    <ul class="space-y-2 text-sm text-slate-600">
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Everything in Standard</li>
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Pro Scam Checker AI</li>
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span> Dedicated Telehealth</li>
                    </ul>
                </div>
            </label>
        </div>

        <!-- Continue Button -->
        <div class="fixed bottom-0 left-0 w-full p-6 bg-white border-t border-slate-100 pb-10 z-50">
            <button onclick="window.location.href='home_dashboard.html'" class="w-full max-w-md mx-auto h-[60px] bg-[#00193c] text-white font-bold text-lg rounded-full shadow-lg shadow-[#00193c]/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                Start Subscription
                <span class="material-symbols-outlined">payments</span>
            </button>
        </div>
    </main>
</body>
</html>
