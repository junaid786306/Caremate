<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Contact Us - Caremate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode:"class",
            theme:{ extend:{ colors:{"primary":"#00193c","secondary":"#4f55ae","background":"#faf9fe"}, fontFamily:{"manrope":["Manrope","sans-serif"]} } }
        }
    </script>
    <style>
        @keyframes pulse-ring {
            0%   { transform: scale(1);   opacity: 0.6; }
            100% { transform: scale(1.7); opacity: 0; }
        }
        .pulse-ring { animation: pulse-ring 1.8s ease-out infinite; }
        .pulse-ring-2 { animation: pulse-ring 1.8s ease-out 0.6s infinite; }
        .pulse-ring-3 { animation: pulse-ring 1.8s ease-out 1.2s infinite; }
        .mic-idle .ring { display: none; }
        .mic-active .ring { display: block; }
        @keyframes waveform {
            0%,100% { height: 8px; }
            50% { height: 28px; }
        }
        .wave-bar { animation: waveform 0.8s ease-in-out infinite; }
    </style>
</head>
<body class="bg-background font-manrope antialiased min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-primary">arrow_back</span>
        </button>
        <h1 class="font-bold text-xl text-primary text-center flex-1">Contact Us</h1>
        <div class="w-10"></div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-between max-w-md mx-auto w-full p-6 pt-12">

        <!-- Top section: status -->
        <div class="text-center space-y-2">
            <p id="status-label" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Tap to speak</p>
            <h2 id="status-title" class="text-2xl font-bold text-primary">Caremate Support</h2>
            <p id="status-sub" class="text-sm text-emerald-500 font-bold">24/7 Available</p>
        </div>

        <!-- Middle: mic button with pulse rings -->
        <div class="relative flex items-center justify-center" style="width:220px;height:220px;">
            <!-- Pulse rings (hidden until active) -->
            <div class="ring pulse-ring absolute w-full h-full rounded-full bg-primary/10 pointer-events-none hidden"></div>
            <div class="ring pulse-ring-2 absolute w-full h-full rounded-full bg-primary/10 pointer-events-none hidden"></div>
            <div class="ring pulse-ring-3 absolute w-full h-full rounded-full bg-primary/10 pointer-events-none hidden"></div>

            <!-- Main button -->
            <button id="mic-btn" onclick="window.location.href='voice_talk.html'"
                class="mic-idle w-36 h-36 rounded-full bg-primary text-white flex flex-col items-center justify-center gap-2 shadow-2xl active:scale-95 transition-all duration-200 relative z-10"
                style="box-shadow: 0 20px 60px rgba(0,25,60,0.35);">
                <!-- Idle: mic icon -->
                <div id="icon-idle" class="flex flex-col items-center gap-1">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">mic</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">Talk</span>
                </div>
                <!-- Active: waveform bars (hidden by default) -->
                <div id="icon-active" class="hidden flex items-end justify-center gap-1" style="height:40px;">
                    <div class="wave-bar w-1.5 bg-white rounded-full" style="animation-delay:0s"></div>
                    <div class="wave-bar w-1.5 bg-white rounded-full" style="animation-delay:0.15s"></div>
                    <div class="wave-bar w-1.5 bg-white rounded-full" style="animation-delay:0.3s"></div>
                    <div class="wave-bar w-1.5 bg-white rounded-full" style="animation-delay:0.15s"></div>
                    <div class="wave-bar w-1.5 bg-white rounded-full" style="animation-delay:0s"></div>
                </div>
            </button>
        </div>

        <!-- Bottom: quick action buttons -->
        <div class="w-full space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <a href="tel:+919665654775" class="flex items-center gap-3 bg-white border border-slate-100 rounded-[20px] p-4 shadow-sm hover:shadow-md transition-shadow active:scale-95">
                    <div class="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined text-emerald-600" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">call</span>
                    </div>
                    <div class="min-w-0">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Call Us</p>
                        <p class="text-xs font-bold text-slate-700 truncate">+91 9665654775</p>
                    </div>
                </a>
                <a href="mailto:support@caremate.health" class="flex items-center gap-3 bg-white border border-slate-100 rounded-[20px] p-4 shadow-sm hover:shadow-md transition-shadow active:scale-95">
                    <div class="w-10 h-10 bg-secondary/10 rounded-full flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined text-secondary" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">mail</span>
                    </div>
                    <div class="min-w-0 overflow-hidden">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Email</p>
                        <p class="text-[10px] font-bold text-slate-700 break-words leading-tight">support@<br>caremate.com</p>
                    </div>
                </a>
            </div>
            <p class="text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">Available 24/7 for you</p>
        </div>

    </main>

    <script>
        // The toggleMic logic is no longer needed here as clicking the mic redirects to voice_talk.html
    </script>
</body>
</html>
