<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Caremate Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001b3f",
                        "secondary": "#4f55ae",
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f0f2f8] text-primary font-manrope antialiased min-h-screen flex flex-col items-center py-12 px-6">
    <!-- Logo & Title -->
    <div class="flex flex-col items-center gap-4 mb-10 text-center">
        <div class="w-16 h-16 bg-[#001b3f] rounded-full flex items-center justify-center shadow-lg">
            <span class="material-symbols-outlined text-white text-3xl">verified_user</span>
        </div>
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">Caremate</h1>
            <p class="text-slate-500 font-medium max-w-[200px] mx-auto">Manage your wellness and safety</p>
        </div>
    </div>

    <!-- Main Container -->
    <div class="w-full bg-white rounded-[48px] p-8 shadow-2xl space-y-8 max-w-md">
        <!-- Toggle Switch -->
        <div class="bg-slate-100 p-1.5 rounded-full flex gap-2">
            <button class="flex-1 py-3 text-[11px] font-bold uppercase tracking-widest bg-white shadow-sm rounded-full transition-all">Login</button>
            <a href="signup.html" class="flex-1 py-3 text-center text-[11px] font-bold uppercase tracking-widest text-slate-500 rounded-full transition-all">Sign Up</a>
        </div>

        <!-- Login Form -->
        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Email Address</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                    <input type="email" placeholder="e.g. name@email.com" class="w-full h-16 pl-14 pr-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-slate-300">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                    <input type="password" placeholder="••••••••" class="w-full h-16 pl-14 pr-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-slate-300">
                </div>
            </div>

            <div class="text-right">
                <a href="#" class="text-xs font-bold text-secondary">Forgot Password?</a>
            </div>

            <a href="home_dashboard.html" class="w-full h-16 bg-[#001b3f] text-white rounded-2xl flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                <span class="text-lg font-bold">Login</span>
                <span class="material-symbols-outlined">arrow_forward</span>
            </a>
        </div>

        <!-- Divider -->
        <div class="flex items-center gap-4">
            <div class="h-[1px] flex-1 bg-slate-100"></div>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Or Secure Access</span>
            <div class="h-[1px] flex-1 bg-slate-100"></div>
        </div>

        <!-- Biometric Login -->
        <button class="w-full h-16 border-2 border-slate-100 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-50 transition-colors active:scale-95">
            <span class="material-symbols-outlined text-secondary text-2xl">face</span>
            <span class="font-bold text-slate-700">Sign in with Face ID</span>
        </button>
    </div>
</body>
</html>
