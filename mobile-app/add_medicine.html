<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Add Medicine - Senior Caremate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00193c",
                        "secondary": "#4f55ae",
                        "on-surface-variant": "#43474f",
                        "outline-variant": "#c4c6d1",
                        "primary-container": "#002d62",
                        "primary-fixed": "#d7e2ff",
                        "surface-variant": "#e3e2e7",
                        "background": "#faf9fe",
                        "on-surface": "#1a1b1f",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f8faff] text-on-surface font-manrope antialiased min-h-screen pb-[120px]">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-primary">arrow_back</span>
        </button>
        <h1 class="font-bold text-xl text-primary">Add Medicine</h1>
        <div class="w-10"></div> <!-- Spacer -->
    </header>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <main class="max-w-md mx-auto p-6 space-y-8">
        <!-- Introduction -->
        <div class="space-y-2">
            <h2 class="text-2xl font-extrabold tracking-tight">New Reminder</h2>
            <p class="text-slate-500 font-medium text-sm">Set up a new medication schedule.</p>
        </div>

        <!-- Form -->
        <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='medicine_reminders.html';">
            <!-- Medicine Name -->
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Medicine Name</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">pill</span>
                    <input type="text" required placeholder="e.g., Atorvastatin" class="w-full h-14 pl-12 pr-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold">
                </div>
            </div>

            <!-- Dosage -->
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Dosage</label>
                <div class="flex gap-3">
                    <div class="flex-1 relative group">
                        <input type="number" required placeholder="50" class="w-full h-14 px-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold">
                    </div>
                    <select class="w-24 h-14 px-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold appearance-none">
                        <option>mg</option>
                        <option>ml</option>
                        <option>pills</option>
                    </select>
                </div>
            </div>

            <!-- Time and Dates -->
            <div class="grid grid-cols-1 gap-6">
                <!-- Time -->
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Reminder Time</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 z-10 pointer-events-none">schedule</span>
                        <input type="time" required class="w-full h-14 pl-12 pr-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold cursor-pointer">
                    </div>
                </div>

                <!-- Date Range -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Start Date</label>
                        <input type="date" class="w-full h-14 px-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1">End Date</label>
                        <input type="date" class="w-full h-14 px-4 bg-white border border-slate-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none font-bold text-sm">
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <div class="pt-4">
                <button type="submit" class="w-full h-16 bg-primary text-white rounded-[24px] font-bold text-lg shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Save Reminder</span>
                </button>
            </div>
        </form>
    </main>

    <script>

    </script>

    <!-- BottomNavBar spacer -->
    <div class="h-24"></div>
</body>
</html>
