<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#dad9df",
                    "on-background": "#1a1b1f",
                    "surface": "#faf9fe",
                    "on-tertiary-fixed-variant": "#43474b",
                    "primary": "#00193c",
                    "tertiary-fixed": "#dfe3e7",
                    "surface-tint": "#3e5e95",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed": "#001b3f",
                    "inverse-surface": "#2f3034",
                    "secondary-fixed": "#e0e0ff",
                    "primary-fixed-dim": "#abc7ff",
                    "tertiary-fixed-dim": "#c3c7cb",
                    "on-secondary-fixed": "#02026b",
                    "surface-variant": "#e3e2e7",
                    "on-primary-fixed-variant": "#24467c",
                    "error": "#ba1a1a",
                    "surface-container": "#eeedf2",
                    "inverse-primary": "#abc7ff",
                    "inverse-on-surface": "#f1f0f5",
                    "on-surface": "#1a1b1f",
                    "on-tertiary-container": "#92969a",
                    "tertiary": "#151a1d",
                    "on-secondary-fixed-variant": "#373c95",
                    "on-tertiary-fixed": "#171c1f",
                    "on-surface-variant": "#43474f",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "background": "#faf9fe",
                    "on-primary-container": "#7796d1",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f4f3f8",
                    "primary-fixed": "#d7e2ff",
                    "surface-container-high": "#e8e7ed",
                    "secondary-container": "#9aa0ff",
                    "error-container": "#ffdad6",
                    "secondary": "#4f55ae",
                    "secondary-fixed-dim": "#bfc2ff",
                    "on-secondary-container": "#2d328b",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "outline": "#747781",
                    "tertiary-container": "#2a2f32",
                    "surface-container-highest": "#e3e2e7",
                    "surface-bright": "#faf9fe",
                    "primary-container": "#002d62",
                    "outline-variant": "#c4c6d1"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "stack-sm": "12px",
                    "margin-page": "24px",
                    "gutter": "16px",
                    "stack-md": "24px",
                    "touch-target-min": "60px",
                    "stack-lg": "40px"
            },
            "fontFamily": {
                    "label-caps": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "display": ["Manrope"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "label-caps": ["14px", {"lineHeight": "20px", "letterSpacing": "1px", "fontWeight": "700"}],
                    "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.3px", "fontWeight": "700"}],
                    "body-lg": ["20px", {"lineHeight": "30px", "fontWeight": "500"}],
                    "display": ["34px", {"lineHeight": "42px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                    "body-md": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #faf9fe;
            background-image: radial-gradient(at 0% 0%, rgba(215, 226, 255, 0.3) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(154, 160, 255, 0.1) 0px, transparent 50%);
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-on-background flex flex-col items-center justify-center p-margin-page">
<!-- Auth Layout Container -->
<main class="w-full max-w-md mx-auto flex flex-col gap-stack-lg pt-12 pb-24">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-stack-sm mb-4">
<div class="w-20 h-20 rounded-xl bg-primary-container flex items-center justify-center shadow-lg shadow-primary/10 mb-4">
<span class="material-symbols-outlined text-primary-fixed text-4xl" data-icon="health_and_safety">health_and_safety</span>
</div>
<h1 class="font-display text-display text-primary">Caremate</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-4">Manage your wellness and safety</p>
</header>
<!-- Form Section -->
<section class="glass-panel p-8 rounded-xl shadow-[0_8px_32px_rgba(0,25,60,0.06)] flex flex-col gap-stack-md">
<!-- Login/Signup Tabs (Senior Friendly) -->
<nav class="flex p-1 bg-surface-container rounded-full mb-2">
<a href="guardian_login.html" class="flex-1 py-3 px-6 rounded-full bg-white shadow-sm font-label-caps text-label-caps text-primary active:scale-95 transition-all">LOGIN</a>
<a href="senior_citizen_signup.html" class="flex-1 py-3 px-6 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors">SIGN UP</a>
</nav>
<form class="flex flex-col gap-6" onsubmit="return false;">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full h-touch-target-min pl-14 pr-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none" placeholder="e.g. name@email.com" type="email">
</div>
</div>
<!-- OTP Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">OTP CODE</label>
<button type="button" class="text-secondary font-bold text-sm hover:underline">Get OTP</button>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="dialpad">dialpad</span>
<input class="w-full h-touch-target-min pl-14 pr-6 bg-surface-container-low border border-outline-variant rounded-DEFAULT font-body-md text-body-md focus:ring-2 focus:ring-secondary focus:border-transparent transition-all outline-none tracking-[0.5em] font-bold" placeholder="••••" type="text" maxlength="4">
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end -mt-2">
<a class="font-label-caps text-label-caps text-secondary hover:underline py-2" href="#">Forgot Password?</a>
</div>
<!-- Main Login Action -->
<a href="home_dashboard.html" class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-DEFAULT shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                    Login
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</a>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-px flex-1 bg-outline-variant"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">OR SECURE ACCESS</span>
<div class="h-px flex-1 bg-outline-variant"></div>
</div>
<!-- Biometric Option -->
<a href="home_dashboard.html" class="w-full h-touch-target-min border-2 border-outline-variant rounded-DEFAULT flex items-center justify-center gap-4 hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="faceid">face</span>
<span class="font-body-lg text-body-lg text-on-background">Sign in with Face ID</span>
</a>
</section>
<!-- Visual Context Image -->
</main>
<!-- Suppressed Navigation as per Destination Rule (Transactional Screen) -->
</body></html>
