<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Two-Factor Authentication - Caremate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00193c",
                        "secondary": "#4f55ae",
                        "background": "#faf9fe",
                        "on-surface": "#1a1b1f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem"
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-manrope antialiased min-h-screen">
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-primary">arrow_back</span>
        </button>
        <h1 class="font-bold text-xl tracking-tight text-primary text-center flex-1">Security</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">
        <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-primary text-lg">Two-Factor Authentication</h3>
                    <p class="text-xs text-slate-500 leading-relaxed font-medium">Add an extra layer of security to your account.</p>
                </div>
                <div class="relative inline-block w-12 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="2fa-toggle" class="w-10 h-5 bg-slate-200 rounded-full appearance-none checked:bg-primary transition-colors cursor-pointer relative after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-4 after:h-4 after:bg-white after:rounded-full after:transition-all checked:after:translate-x-5">
                </div>
            </div>
            
            <div class="pt-4 space-y-4" id="authenticator-section">
                <div class="bg-primary text-white p-6 rounded-[24px] relative overflow-hidden shadow-xl">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>
                    <div class="absolute bottom-0 left-0 w-24 h-24 bg-secondary/20 rounded-full blur-xl translate-y-1/2 -translate-x-1/2"></div>
                    
                    <div class="relative z-10 flex items-center justify-between mb-2">
                        <span class="text-xs font-bold uppercase tracking-widest text-primary-fixed-dim opacity-80">Caremate Guard</span>
                        
                        <!-- Timer Ring -->
                        <div class="relative w-8 h-8 flex items-center justify-center">
                            <svg class="transform -rotate-90 w-8 h-8">
                                <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="3" fill="transparent" class="text-white/20" />
                                <circle id="timer-ring" cx="16" cy="16" r="14" stroke="currentColor" stroke-width="3" fill="transparent" stroke-dasharray="88" stroke-dashoffset="0" class="text-secondary-fixed transition-all duration-1000 ease-linear" />
                            </svg>
                            <span id="timer-text" class="absolute text-[10px] font-bold">30</span>
                        </div>
                    </div>
                    
                    <div class="relative z-10 flex gap-2 justify-center my-6">
                        <span id="code-1" class="text-4xl font-mono font-bold tracking-widest text-white drop-shadow-md">123</span>
                        <span class="text-4xl font-mono font-bold text-white/50">-</span>
                        <span id="code-2" class="text-4xl font-mono font-bold tracking-widest text-white drop-shadow-md">456</span>
                    </div>
                    
                    <p class="relative z-10 text-[10px] text-center text-white/70">Code refreshes automatically. Do not share.</p>
                </div>
            </div>
            
            <script>
                // Dynamic Authenticator Logic
                function generateCode() {
                    return Math.floor(100 + Math.random() * 900).toString();
                }

                function refreshCode() {
                    document.getElementById('code-1').innerText = generateCode();
                    document.getElementById('code-2').innerText = generateCode();
                }

                let timeLeft = 30;
                const ring = document.getElementById('timer-ring');
                const text = document.getElementById('timer-text');
                const circumference = 88; // 2 * pi * 14 approx
                
                setInterval(() => {
                    timeLeft--;
                    if (timeLeft < 0) {
                        timeLeft = 30;
                        refreshCode();
                        // Add flash effect
                        const authBox = document.getElementById('authenticator-section').firstElementChild;
                        authBox.classList.add('opacity-50');
                        setTimeout(() => authBox.classList.remove('opacity-50'), 150);
                    }
                    text.innerText = timeLeft;
                    
                    // Update ring dashoffset
                    const offset = circumference - (timeLeft / 30) * circumference;
                    ring.style.strokeDashoffset = offset;
                    
                    if(timeLeft <= 5) {
                        ring.classList.add('text-red-400');
                        ring.classList.remove('text-secondary-fixed');
                    } else {
                        ring.classList.add('text-secondary-fixed');
                        ring.classList.remove('text-red-400');
                    }
                }, 1000);
                
                // Initial generation
                refreshCode();
            </script>
        </div>
    </main>
</body></html>
