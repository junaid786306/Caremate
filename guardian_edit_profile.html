<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Edit Profile - Guardian</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001b3f",
                        "secondary": "#4f55ae",
                        "accent": "#002D62"
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .badge-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .badge-active {
            border: 2px solid #001b3f;
            background-color: #f8faff;
        }
        .badge-inactive {
            background-color: #ffffff;
            border: 1px solid #f1f5f9;
        }
    </style>
</head>
<body class="bg-[#fcfdff] text-primary font-manrope antialiased min-h-screen pb-20">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white px-6 py-4 flex justify-between items-center border-b border-slate-100">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 transition-colors">
            <span class="material-symbols-outlined text-primary">arrow_back</span>
        </button>
        <h1 class="font-bold text-lg text-accent">Edit Profile</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-8 space-y-10">
        <!-- Profile Image with Edit Overlay -->
        <div class="flex justify-center">
            <div class="relative">
                <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-white shadow-xl">
                    <img src="eleanor_fitzgerald_profile_1777714253211.png" alt="Profile" class="w-full h-full object-cover">
                </div>
                <button class="absolute bottom-1 right-1 w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center text-primary border border-slate-100 active:scale-90 transition-transform">
                    <span class="material-symbols-outlined text-xl">edit</span>
                </button>
            </div>
        </div>

        <!-- Form Fields -->
        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-1">Full Name</label>
                <input type="text" value="Eleanor Fitzgerald" class="w-full px-6 py-4 rounded-3xl bg-white border border-slate-100 shadow-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-medium transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-1">Username</label>
                <input type="text" value="@eleanor_fitz" class="w-full px-6 py-4 rounded-3xl bg-white border border-slate-100 shadow-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-medium transition-all text-slate-600">
            </div>        <div class="space-y-4 pt-4 text-center">
            <a href="guardian_profile.html" class="block w-full bg-primary text-white py-5 rounded-[24px] font-bold shadow-xl shadow-blue-900/10 active:scale-95 transition-transform">
                Confirm Profile Changes
            </a>
            <a href="guardian_profile.html" class="block w-full py-2 text-red-600 font-bold hover:text-red-700 transition-colors">
                Discard Changes
            </a>
        </div>
    </main>
</body>
</html>
