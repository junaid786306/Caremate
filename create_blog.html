<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Create Blog - Caremate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00193c",
                        "secondary": "#4f55ae",
                        "background": "#faf9fe",
                        "on-surface": "#1a1b1f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem"
                    },
                    "fontFamily": {
                        "manrope": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-manrope antialiased min-h-screen flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-6 py-4 flex justify-between items-center h-[72px]">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined text-primary">close</span>
        </button>
        <h1 class="font-bold text-xl tracking-tight text-primary text-center flex-1">Create Blog</h1>
        <button onclick="publishBlog()" class="text-primary font-bold text-sm px-4 py-2 hover:bg-slate-50 rounded-full transition-colors">Publish</button>
    </header>

    <main class="flex-1 p-6 max-w-2xl mx-auto w-full space-y-8">
        <!-- Cover editor -->
        <div class="space-y-4">
        <div id="cover-editor" class="relative w-full aspect-[16/10] bg-slate-100 rounded-[28px] overflow-hidden border border-slate-200 flex flex-col items-center justify-center group">
            <img id="image-preview" draggable="false" class="absolute inset-0 w-full h-full object-cover hidden select-none" style="touch-action:none; cursor:grab; transform-origin:center;">
            <button id="upload-placeholder" type="button" onclick="document.getElementById('blog-image').click()" class="flex flex-col items-center gap-3 text-slate-400 group-hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-5xl">add_a_photo</span>
                <span class="font-bold text-sm uppercase tracking-widest">Add Cover Image</span>
                <span class="text-xs text-slate-300">Choose a photo to begin</span>
            </button>
            <input type="file" id="blog-image" accept="image/*" class="hidden" onchange="previewImage(this)">
            <button id="change-cover-btn" type="button" onclick="event.stopPropagation(); document.getElementById('blog-image').click()" class="hidden absolute top-3 right-3 h-9 px-3 rounded-xl bg-black/55 text-white backdrop-blur-md text-xs font-bold items-center gap-1.5">
                <span class="material-symbols-outlined text-[17px]">swap_horiz</span> Change
            </button>
            <div id="caption-overlay" class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/60 to-transparent hidden">
                <input type="text" id="image-caption" placeholder="Add a caption..." class="w-full bg-transparent border-b border-white/50 text-white placeholder-white/60 text-sm focus:outline-none focus:border-white pb-1" onclick="event.stopPropagation()">
            </div>
        </div>

        <section id="cover-controls" class="hidden bg-white border border-slate-200 rounded-2xl p-4 space-y-4 shadow-sm">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <h2 class="text-sm font-extrabold text-primary">Cover image</h2>
                    <p class="text-xs text-slate-400 mt-1 flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">pan_tool_alt</span> Drag the photo to reposition it</p>
                </div>
                <button type="button" onclick="resetCoverPosition()" class="h-9 px-3 rounded-xl bg-slate-100 text-xs font-bold text-slate-600">Reset</button>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Cover size</p>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="setCoverRatio('wide', this)" class="cover-ratio h-10 rounded-xl bg-primary text-white text-xs font-bold">Wide</button>
                    <button type="button" onclick="setCoverRatio('square', this)" class="cover-ratio h-10 rounded-xl bg-slate-100 text-slate-600 text-xs font-bold">Square</button>
                    <button type="button" onclick="setCoverRatio('portrait', this)" class="cover-ratio h-10 rounded-xl bg-slate-100 text-slate-600 text-xs font-bold">Portrait</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="setCoverFit('cover', this)" class="cover-fit h-10 rounded-xl bg-primary text-white text-xs font-bold flex items-center justify-center gap-1.5"><span class="material-symbols-outlined text-[17px]">crop_free</span> Fill frame</button>
                <button type="button" onclick="setCoverFit('contain', this)" class="cover-fit h-10 rounded-xl bg-slate-100 text-slate-600 text-xs font-bold flex items-center justify-center gap-1.5"><span class="material-symbols-outlined text-[17px]">fit_screen</span> Fit image</button>
            </div>
            <label class="flex items-center gap-3">
                <span class="material-symbols-outlined text-slate-400">zoom_in</span>
                <input id="cover-zoom" type="range" min="100" max="220" value="100" oninput="setCoverZoom(this.value)" class="flex-1 accent-primary">
                <span id="zoom-value" class="w-10 text-right text-xs font-bold text-slate-500">100%</span>
            </label>
            <label class="min-h-12 flex items-center gap-3 border-t border-slate-100 pt-3 cursor-pointer">
                <span class="material-symbols-outlined text-secondary">account_circle</span>
                <span class="flex-1"><span class="block text-sm font-bold text-primary">Use as profile cover</span><span class="block text-[11px] text-slate-400 mt-0.5">Also update your public profile cover</span></span>
                <input id="use-profile-cover" type="checkbox" class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary">
            </label>
        </section>
        </div>

        <!-- Inputs -->
        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Blog Title</label>
                <input type="text" placeholder="Enter an engaging title..." class="w-full text-3xl font-extrabold text-primary border-none focus:ring-0 placeholder:text-slate-200 p-0 bg-transparent">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Category</label>
                <div id="category-row" class="flex gap-2 overflow-x-auto pb-1" style="scrollbar-width:none">
                    <button onclick="selectCategory(this)" class="px-5 py-2 bg-primary text-white rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0">Health</button>
                    <button onclick="selectCategory(this)" class="px-5 py-2 bg-slate-100 text-slate-400 rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0">Lifestyle</button>
                    <button onclick="selectCategory(this)" class="px-5 py-2 bg-slate-100 text-slate-400 rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0">Nutrition</button>
                    <button onclick="selectCategory(this)" class="px-5 py-2 bg-slate-100 text-slate-400 rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0">Story</button>
                    <button onclick="addCategory()" class="px-5 py-2 border-2 border-dashed border-slate-300 text-slate-400 rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0 flex items-center gap-1 hover:border-primary hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-sm">add</span> New
                    </button>
                </div>
            </div>

            <!-- Tags -->
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Tags</label>
                <div class="flex items-center gap-2 flex-wrap" id="tags-container">
                    <button onclick="document.getElementById('tag-input').focus()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition-colors">
                        <span class="material-symbols-outlined text-slate-500">sell</span>
                    </button>
                    <input type="text" id="tag-input" placeholder="Add tag & press Enter" class="flex-1 min-w-[120px] text-sm text-slate-600 border border-slate-200 rounded-full px-4 py-2 focus:ring-2 focus:ring-primary/10 focus:outline-none" onkeydown="addTag(event)">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Content</label>
                <textarea placeholder="Start writing your thoughts..." class="w-full min-h-[300px] text-lg text-slate-600 border-none focus:ring-0 placeholder:text-slate-200 p-0 bg-transparent leading-relaxed resize-none"></textarea>
            </div>
        </div>
    </main>

    <script>
        let coverX = 0;
        let coverY = 0;
        let coverZoom = 1;
        let coverFit = 'cover';
        let coverRatio = 'wide';
        let dragStart = null;

        function applyCoverTransform() {
            const image = document.getElementById('image-preview');
            image.style.transform = `translate3d(${coverX}px, ${coverY}px, 0) scale(${coverZoom})`;
            image.style.objectFit = coverFit;
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const image = document.getElementById('image-preview');
                    image.src = e.target.result;
                    image.classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    document.getElementById('caption-overlay').classList.remove('hidden');
                    document.getElementById('cover-controls').classList.remove('hidden');
                    document.getElementById('change-cover-btn').classList.remove('hidden');
                    document.getElementById('change-cover-btn').classList.add('flex');
                    resetCoverPosition();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function setCoverRatio(ratio, button) {
            coverRatio = ratio;
            const editor = document.getElementById('cover-editor');
            editor.classList.remove('aspect-[16/10]', 'aspect-square', 'aspect-[4/5]');
            editor.classList.add(ratio === 'square' ? 'aspect-square' : ratio === 'portrait' ? 'aspect-[4/5]' : 'aspect-[16/10]');
            document.querySelectorAll('.cover-ratio').forEach(item => {
                item.classList.remove('bg-primary', 'text-white');
                item.classList.add('bg-slate-100', 'text-slate-600');
            });
            button.classList.remove('bg-slate-100', 'text-slate-600');
            button.classList.add('bg-primary', 'text-white');
            resetCoverPosition();
        }

        function setCoverFit(fit, button) {
            coverFit = fit;
            document.querySelectorAll('.cover-fit').forEach(item => {
                item.classList.remove('bg-primary', 'text-white');
                item.classList.add('bg-slate-100', 'text-slate-600');
            });
            button.classList.remove('bg-slate-100', 'text-slate-600');
            button.classList.add('bg-primary', 'text-white');
            resetCoverPosition();
        }

        function setCoverZoom(value) {
            coverZoom = Number(value) / 100;
            document.getElementById('zoom-value').textContent = `${value}%`;
            applyCoverTransform();
        }

        function resetCoverPosition() {
            coverX = 0;
            coverY = 0;
            coverZoom = 1;
            const slider = document.getElementById('cover-zoom');
            slider.value = 100;
            document.getElementById('zoom-value').textContent = '100%';
            applyCoverTransform();
        }

        const coverImage = document.getElementById('image-preview');
        coverImage.addEventListener('pointerdown', event => {
            if (coverImage.classList.contains('hidden')) return;
            dragStart = { x: event.clientX, y: event.clientY, coverX, coverY };
            coverImage.setPointerCapture(event.pointerId);
            coverImage.style.cursor = 'grabbing';
        });
        coverImage.addEventListener('pointermove', event => {
            if (!dragStart) return;
            const editor = document.getElementById('cover-editor');
            const limitX = editor.clientWidth * .42;
            const limitY = editor.clientHeight * .42;
            coverX = Math.max(-limitX, Math.min(limitX, dragStart.coverX + event.clientX - dragStart.x));
            coverY = Math.max(-limitY, Math.min(limitY, dragStart.coverY + event.clientY - dragStart.y));
            applyCoverTransform();
        });
        function endCoverDrag(event) {
            if (!dragStart) return;
            dragStart = null;
            coverImage.style.cursor = 'grab';
            if (coverImage.hasPointerCapture(event.pointerId)) coverImage.releasePointerCapture(event.pointerId);
        }
        coverImage.addEventListener('pointerup', endCoverDrag);
        coverImage.addEventListener('pointercancel', endCoverDrag);

        function selectCategory(btn) {
            document.querySelectorAll('#category-row button').forEach(b => {
                b.className = 'px-5 py-2 bg-slate-100 text-slate-400 rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0';
            });
            btn.className = 'px-5 py-2 bg-primary text-white rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0';
        }

        function addCategory() {
            const name = prompt('Enter new category name:');
            if (name && name.trim()) {
                const row = document.getElementById('category-row');
                const addBtn = row.querySelector('button:last-child');
                const newBtn = document.createElement('button');
                newBtn.onclick = function() { selectCategory(this); };
                newBtn.className = 'px-5 py-2 bg-slate-100 text-slate-400 rounded-full text-[10px] font-bold uppercase tracking-wider flex-shrink-0';
                newBtn.textContent = name.trim().toUpperCase();
                row.insertBefore(newBtn, addBtn);
            }
        }

        function addTag(e) {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const tag = e.target.value.trim();
                const container = document.getElementById('tags-container');
                const tagEl = document.createElement('span');
                tagEl.className = 'px-3 py-1 bg-secondary/10 text-secondary rounded-full text-xs font-bold flex items-center gap-1';
                tagEl.innerHTML = `#${tag} <button onclick="this.parentElement.remove()" class="text-secondary/60 hover:text-red-500 ml-1">✕</button>`;
                container.insertBefore(tagEl, e.target);
                e.target.value = '';
            }
        }

        function publishBlog() {
            const coverImage = document.getElementById('image-preview');
            const blogDraft = {
                title: document.querySelector('input[placeholder="Enter an engaging title..."]').value.trim(),
                content: document.querySelector('textarea[placeholder="Start writing your thoughts..."]').value.trim(),
                imageCaption: document.getElementById('image-caption').value.trim(),
                coverImage: coverImage.src || '',
                coverPosition: { x: coverX, y: coverY, zoom: coverZoom, fit: coverFit, ratio: coverRatio },
                publishedAt: new Date().toISOString()
            };
            localStorage.setItem('caremate-latest-blog', JSON.stringify(blogDraft));
            if (document.getElementById('use-profile-cover').checked && coverImage.src) {
                localStorage.setItem('user_profile_cover', coverImage.src);
            }
            alert('Your blog post has been published successfully!');
            window.location.href = 'community_hub.html';
        }
    </script>
</body></html>
