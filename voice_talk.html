<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode:"class",
            theme:{ extend:{ colors:{"primary":"#000000","secondary":"#4f55ae"}, fontFamily:{"manrope":["Manrope","sans-serif"]} } }
        }
    </script>
    <style>
        .orb-container {
            width: 200px;
            height: 200px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .orb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f55ae, #2dd4bf);
            animation: breathe 3s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(79, 85, 174, 0.6);
            position: relative;
            z-index: 10;
        }
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 40px rgba(79, 85, 174, 0.6); }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 80px rgba(45, 212, 191, 0.8); }
            100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 40px rgba(79, 85, 174, 0.6); }
        }
        .waveform {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            animation: pulse-wave 2s linear infinite;
        }
        @keyframes pulse-wave {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body class="bg-black text-white font-manrope antialiased min-h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="px-6 py-6 flex justify-between items-center z-50">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors backdrop-blur-md">
            <span class="material-symbols-outlined text-white">close</span>
        </button>
        <div class="flex gap-2">
            <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors backdrop-blur-md">
                <span class="material-symbols-outlined text-white">more_horiz</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 relative">
        <div class="text-center mb-16 absolute top-10">
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest animate-pulse">Listening...</p>
        </div>

        <div class="orb-container">
            <div class="waveform" style="animation-delay: 0s;"></div>
            <div class="waveform" style="animation-delay: 0.6s;"></div>
            <div class="waveform" style="animation-delay: 1.2s;"></div>
            <div class="orb"></div>
        </div>
    </main>

    <!-- Footer Controls -->
    <footer class="p-8 pb-12 flex justify-center gap-6 z-50">
        <button class="w-14 h-14 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors backdrop-blur-md">
            <span class="material-symbols-outlined text-white">mic_off</span>
        </button>
        <button onclick="history.back()" class="w-16 h-16 rounded-full bg-red-500 flex items-center justify-center hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">
            <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">call_end</span>
        </button>
        <button class="w-14 h-14 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors backdrop-blur-md">
            <span class="material-symbols-outlined text-white">volume_up</span>
        </button>
    </footer>

</body>
</html>
